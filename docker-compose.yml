version: "3.9"
services:
  app:
    build: .
    image: pokemon-tournament-system:3.3.4
    environment:
      PORT: "18765"
      PUBLIC_BASE_URL: ""
      DATA_ROOT: /data
      PYTHON_BIN: /usr/local/bin/python
    ports:
      - "18765:18765"
    volumes:
      - ./data:/data
    restart: unless-stopped
