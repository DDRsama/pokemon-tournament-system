<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>赛事后台 - Pokemon Tournament System</title>
<link rel="icon" type="image/svg+xml" href="/shared/favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="/shared/app-icon-192.png">
  <link rel="apple-touch-icon" href="/shared/apple-touch-icon.png">
  <link rel="stylesheet" href="/shared/theme.css?v=3.3-release-1">
  <script src="/shared/font-loader.js?v=3.3-font-loader-1"></script>
  <link rel="stylesheet" href="/admin/admin.css?v=3.3-admin-confirm-1">
  <script src="/shared/i18n.js?v=3.3-i18n-scan-1"></script>
</head>
<body>

<!-- 顶部导航 -->
<header class="topbar">
  <div class="brand">
    <img class="brand-mark" src="/shared/favicon.svg" alt="">
    <span class="brand-text">Pokemon Tournament System</span>
  </div>
  <div class="version">3.3.0</div>
</header>

<div class="admin-toolbar">
  <div class="admin-toolbar-left">
    <div class="toolbar-title">🎮赛事管理</div>
    <div class="tournament-current single">
      <span class="tname" id="tourName">—</span>
    </div>
  </div>
  <div class="admin-toolbar-right">
    <div class="topbar-actions">
      <button class="btn btn-secondary btn-sm" onclick="location.href='/'">返回主页</button>
      <button class="btn btn-secondary btn-sm" id="btnExportReport" onclick="exportReport()" title="比赛完成后可导出战报" disabled>导出战报</button>
    </div>
    <span class="phase-badge" id="phaseBadge">等待开始</span>
    <span class="round-tag" id="roundLabel"></span>
    <span class="ws-status"><span class="ws-dot" id="wsDot"></span><span id="wsText">未连接</span></span>
  </div>
</div>

<div class="main">
  <!-- 左栏 -->
  <div class="panel panel-left">
    <div class="panel-title">🧩 阶段</div>
    <div class="stage-config-panel">
      <div class="config-row">
        <span>赛事结构</span>
        <span id="presetName" style="color:#f8fafc;font-weight:700;">—</span>
      </div>
      <div id="stageList" class="stage-list"></div>
      <div id="settingsMessage" class="settings-message"></div>
    </div>

    <div class="panel-title" id="participantPanelTitle" style="margin-top:16px;">📋 选手 <span id="playerCount" style="color:#94a3b8;">0</span></div>
    <div class="add-player">
      <input type="text" id="playerInput" placeholder="选手名称..." onkeydown="if(event.key==='Enter')addPlayer()">
      <button class="btn btn-primary" onclick="addPlayer()">+</button>
    </div>
    <label class="single-profile-toggle" id="singleProfileToggle">
      <input type="checkbox" id="singleCreateProfile">
      <span>
        <strong>未匹配时登记长期档案</strong>
        <small>默认只绑定已有档案，未匹配保持临时参赛</small>
      </span>
    </label>
    <button class="btn btn-secondary" id="bulkAddBtn" style="width:100%;margin-bottom:10px;font-size:11px;" onclick="showBulkAdd()">批量导入</button>
    <div id="playerList"></div>
  </div>

  <!-- 中栏 -->
  <div class="panel panel-center">
    <div id="stageIdleScreen" class="stage-idle-screen">
      <div class="stage-idle-card">
        <div class="stage-idle-kicker" id="stageIdleKicker">等待开始</div>
        <div class="stage-idle-title" id="stageIdleTitle">阶段尚未开始</div>
        <div class="stage-idle-meta" id="stageIdleMeta">参赛者就绪后可启动阶段</div>
        <div class="stage-idle-actions" id="stageIdleActions"></div>
      </div>
    </div>
    <div id="top8Bracket">
      <div class="bracket-header">
        <span>🏆 淘汰赛阶段</span>
        <div class="bracket-progress" id="bracketProgress"></div>
      </div>
      <div id="top8PhaseHint" class="phase-hint"></div>
      <div id="top8MatchList"></div>
    </div>
    <div id="stageArena">
      <div class="round-header">
        <span class="round-label" id="stageArenaTitle">阶段对局</span>
      </div>
      <div id="stageMatchList"></div>
    </div>
  </div>

  <!-- 右栏 -->
  <div class="panel panel-right">
    <div class="side-section">
      <div class="panel-title">🌐 访问地址</div>
      <div class="side-module" data-admin-modern="public-url">
        <div class="address-label">Public Base URL</div>
        <div class="address-control">
          <span class="address-prefix">http://</span>
          <input type="text" class="address-input" id="publicBaseUrlInput" placeholder="设置访问 IP/域名，缺省则默认内网 IP">
          <button id="publicBaseUrlConfirmBtn" class="address-confirm-btn" type="button">确认</button>
        </div>
        <div id="publicBaseUrlMessage" class="address-message"></div>
      </div>
    </div>

    <div class="side-section">
      <div class="panel-title">📺 叠加层</div>
      <div class="side-module" data-admin-modern="overlay">
        <div class="overlay-preview">
          <iframe id="overlayFrame" style="display:none;"></iframe>
          <div class="overlay-preview-fallback" id="overlayPreviewFallback">
            <div class="overlay-preview-kicker">OVERLAY PREVIEW</div>
            <div class="overlay-preview-title">等待叠加层状态</div>
            <div class="overlay-preview-meta">启动赛事后预览生效</div>
          </div>
        </div>
        <div class="live-room-box" data-admin-modern="live-room">
          <div class="side-subtitle">直播桌房号</div>
          <div class="live-room-control">
            <input type="text" id="liveRoomCodeInput" class="live-room-input" placeholder="直播桌房号" autocomplete="off">
            <button id="liveRoomCodeSaveBtn" class="live-room-save-btn" type="button">保存</button>
          </div>
          <div id="liveRoomCodeMessage" class="live-room-message"></div>
        </div>
        <div class="obs-hint">
          <div class="side-subtitle">OBS 设置</div>
          <div class="obs-row"><span>来源</span><strong>浏览器源</strong></div>
          <div class="obs-url-row">
            <div class="obs-url-top">
              <span class="obs-url-label">URL</span>
              <button class="copy-btn" onclick="copyOverlayUrl(this)">复制</button>
            </div>
            <div class="hidden-link-value" id="overlayUrl">—</div>
          </div>
          <div class="obs-row"><span>尺寸</span><strong>1920 × 1080</strong></div>
        </div>
      </div>
    </div>

    <div class="side-section">
        <div class="panel-title" id="playerEntrySectionTitle">📱 选手端</div>
      <div class="side-module" data-admin-modern="player-entry">
        <div class="player-qr-box">
          <div class="player-qr-label">选手二维码</div>
          <button class="player-qr-button" type="button" onclick="copyPlayerEntryUrl()" title="点击复制选手入口链接" aria-label="复制选手入口链接">
            <span class="player-qr-frame"><span id="playerQrImage"></span></span>
          </button>
          <div class="player-qr-tip">扫码进入选手个人页</div>
          <div class="hidden-link-value" id="playerEntryUrl">—</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 批量弹窗 -->
<div id="bulkModal">
  <div class="modal-box">
    <h2 id="bulkModalTitle">批量导入选手</h2>
    <p>每行一个名称</p>
    <textarea id="bulkText"></textarea>
    <label class="bulk-profile-toggle" id="bulkProfileToggle">
      <input type="checkbox" id="bulkCreateProfiles">
      <span>
        <strong>未匹配时登记长期档案</strong>
        <small>默认只绑定已有档案，未匹配保持临时参赛</small>
      </span>
    </label>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeBulkAdd()">取消</button>
      <button class="btn btn-primary" onclick="bulkAdd()">确认导入</button>
    </div>
  </div>
</div>

<script src="/shared/qrcode.js"></script>
<script src="/admin/state.js?v=3.0-live-room-config"></script>
<script src="/admin/api.js?v=3.0-live-room-config"></script>
<script src="/admin/modals.js?v=3.3-single-profile-mode-1"></script>
<script src="/admin/stages-panel.js?v=3.0-swiss-revert-round"></script>
<script src="/admin/rules-panel.js?v=3.0-swiss-revert-round"></script>
<script src="/admin/admin.js?v=3.3-confirm-i18n-1"></script>
</body>
</html>
