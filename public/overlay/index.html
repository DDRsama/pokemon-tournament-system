<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>叠加层 - Pokemon Tournament System</title>
<link rel="icon" type="image/svg+xml" href="/shared/favicon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="/shared/app-icon-192.png">
<link rel="apple-touch-icon" href="/shared/apple-touch-icon.png">
<script src="/shared/font-loader.js?v=3.3-font-loader-2"></script>
<link rel="preload" as="image" href="/shared/pokemon-champions-title.png">
<link rel="stylesheet" href="/shared/theme.css?v=3.3-release-1">
<link rel="stylesheet" href="/shared/overlay/overlay.css?v=3.1-visual-polish-1">
<script src="/shared/i18n.js?v=3.3-i18n-scan-1"></script>
<style>
  html:not([data-pts-overlay-boot="ready"]) #overlay-shell {
    visibility: hidden;
  }
</style>
</head>
<body>
  <main id="overlay-shell">
    <div id="overlay-root" class="overlay-layer overlay-layer-current"></div>
    <div id="overlay-buffer" class="overlay-layer overlay-layer-buffer" aria-hidden="true"></div>
  </main>

  <template id="tpl-idle">
    <section id="view-idle" class="pts-view">
      <div id="state-idle">
        <div id="idleTitle"></div>
        <div id="idleSub"></div>
        <div class="idle-qr-wrap">
          <div class="idle-qr-frame"><div id="idleQrImage"></div></div>
          <div class="idle-qr-tip" id="idleQrTip">扫码进入本场比赛选手页</div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-swiss-live">
    <section id="view-swiss-live" class="pts-view">
      <div id="topBar">
        <span id="tournamentName"></span>
        <span id="phaseTag"></span>
        <span id="liveTime"></span>
      </div>
      <div id="state-live">
        <div class="round-tag" id="liveRoundTag"></div>
        <div class="match-info">
          <div class="live-player-container">
            <div class="player-name" id="liveP1Name"></div>
            <div class="live-record" id="liveP1Record"></div>
          </div>
          <div class="vs-text">VS</div>
          <div class="live-player-container right">
            <div class="player-name" id="liveP2Name"></div>
            <div class="live-record" id="liveP2Record"></div>
          </div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-swiss-result">
    <section id="view-swiss-result" class="pts-view">
      <div id="topBar">
        <span id="tournamentName"></span>
        <span id="phaseTag"></span>
        <span id="liveTime"></span>
      </div>
      <div id="state-result">
        <div class="result-panel">
          <div class="result-kicker">WINNER</div>
          <div id="resultVs"></div>
          <div id="resultWinner"></div>
          <div id="resultWinText"></div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-swiss-overview">
    <section id="view-swiss-overview" class="pts-view">
      <div id="topBar">
        <span id="tournamentName"></span>
        <span id="phaseTag"></span>
        <span id="liveTime"></span>
      </div>
      <div id="state-overview">
        <div class="ov-left">
          <div id="ovRoundName"></div>
          <div class="ov-title-line" aria-hidden="true"></div>
          <div id="ovRoundTag"></div>
          <div id="ovProgressText"></div>
          <div id="ovProgressFill"></div>
          <div id="ovPlayerList" class="ov-player-list"></div>
        </div>
        <div class="ov-right">
          <div class="ov-table-head">
            <div id="ovTableTitle" class="ov-table-title">对阵桌</div>
            <div class="ov-table-line" aria-hidden="true"></div>
            <div id="ovTableSubtitle" class="ov-table-subtitle"></div>
          </div>
          <div id="ovTableList" class="ov-table-list"></div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-swiss-ended">
    <section id="view-swiss-ended" class="pts-view">
      <div id="topBar">
        <span id="tournamentName"></span>
        <span id="phaseTag"></span>
        <span id="liveTime"></span>
      </div>
      <div id="state-swiss-ended"></div>
    </section>
  </template>

  <template id="tpl-top8-live">
    <section id="view-top8-live" class="pts-view">
      <div id="topBar">
        <span id="tournamentName"></span>
        <span id="phaseTag"></span>
        <span id="liveTime"></span>
      </div>
      <div id="state-top8-live">
        <div id="top8LiveInfo" class="top8-live-stage">
          <div class="top8-live-player left">
            <div id="top8P1" class="top8-live-name"></div>
            <div id="top8P1Score" class="top8-live-score"></div>
          </div>
          <div class="top8-live-scoreboard">
            <div id="top8Vs" class="top8-live-vs">VS</div>
            <img class="top8-live-logo" src="/shared/pokemon-champions-title.png" alt="">
            <div class="top8-live-meta">
              <div id="top8Phase" class="top8-live-phase"></div>
              <div class="top8-live-bo" id="top8BoLabel">BO3</div>
            </div>
          </div>
          <div class="top8-live-player right">
            <div id="top8P2" class="top8-live-name"></div>
            <div id="top8P2Score" class="top8-live-score"></div>
          </div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-top8-result">
    <section id="view-top8-result" class="pts-view">
      <div id="topBar">
        <span id="tournamentName"></span>
        <span id="phaseTag"></span>
        <span id="liveTime"></span>
      </div>
      <div id="state-top8-result">
        <div class="top8-result-panel">
          <div class="top8-result-phase" id="top8ResultPhase"></div>
          <div id="top8ResultScore"></div>
          <div id="top8ResultWinner"></div>
          <div id="top8ResultWinText"></div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-top8-bracket">
    <section id="view-top8-bracket" class="pts-view">
      <div id="topBar">
        <span id="tournamentName"></span>
        <span id="phaseTag"></span>
        <span id="liveTime"></span>
      </div>
      <div id="state-top8-bracket">
        <div id="bracketPhaseLabel"></div>
        <div id="bracketStages"></div>
      </div>
    </section>
  </template>

  <template id="tpl-top8-overview">
    <section id="view-top8-overview" class="pts-view">
      <div id="topBar">
        <span id="tournamentName"></span>
        <span id="phaseTag"></span>
        <span id="liveTime"></span>
      </div>
      <div id="state-overview">
        <div class="ov-left">
          <div id="ovRoundName"></div>
          <div id="ovRoundTag"></div>
          <div id="ovProgressText"></div>
          <div id="ovProgressFill"></div>
          <div id="ovPlayerList" class="ov-player-list"></div>
        </div>
        <div class="ov-right">
          <div class="ov-table-head">
            <div id="ovTableTitle" class="ov-table-title">对阵桌</div>
            <div class="ov-table-line" aria-hidden="true"></div>
            <div id="ovTableSubtitle" class="ov-table-subtitle"></div>
          </div>
          <div id="ovTableList" class="ov-table-list"></div>
        </div>
      </div>
    </section>
  </template>

  <template id="tpl-podium">
    <section id="view-podium" class="pts-view">
      <div id="state-podium">
        <div id="confetti"></div>
      </div>
    </section>
  </template>

  <template id="tpl-error">
    <section id="view-error" class="pts-view">
      <div class="pts-error-panel">
        <div class="pts-error-title">叠加层错误</div>
        <div class="pts-error-message" id="overlayErrorMessage">叠加层加载失败</div>
      </div>
    </section>
  </template>

<script src="/shared/qrcode.js"></script>
<script src="/shared/overlay/core.js?v=3.3-transition-1"></script>
<script src="/shared/overlay/view-context.js?v=3.0-overlay"></script>
<script src="/shared/overlay/state-router.js?v=3.1-visual-polish-1"></script>
<script src="/shared/overlay/transition-manager.js?v=3.3-transition-1"></script>
<script src="/shared/overlay/state.js?v=3.0-overlay"></script>
<script src="/shared/overlay/utils.js?v=3.0-overlay"></script>
<script src="/shared/overlay/views/top8-overview.js?v=3.0-overlay"></script>
<script src="/shared/overlay/views/swiss-overview.js?v=3.1-visual-polish-1"></script>
<script src="/shared/overlay/views/swiss-ended.js?v=3.0-overlay-swiss-ended-topn-title"></script>
<script src="/shared/overlay/views/podium.js?v=3.0-overlay-topn-1"></script>
<script src="/shared/overlay/views/top8-bracket.js?v=3.0-overlay"></script>
<script src="/shared/overlay/views/compat-views.js?v=3.0-overlay-topn-labels-1"></script>
<script src="/shared/overlay/router.js?v=3.0-overlay"></script>
<script src="/shared/overlay/boot.js?v=3.0-overlay"></script>
</body>
</html>
