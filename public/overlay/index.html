<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Tournament Overlay</title>
<link rel="stylesheet" href="/shared/theme.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1920px; height: 1080px; overflow: hidden; background: transparent; font-family: var(--pto-font-sans); user-select: none; }

  .stroke { -webkit-text-stroke: 2px rgba(0,0,0,0.8); paint-order: stroke fill; }
  .stroke-thick { -webkit-text-stroke: 3px rgba(0,0,0,0.9); paint-order: stroke fill; }

  /* ── 通用顶部信息栏 ─────────────────────────────────── */
  #topBar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 56px;
    display: none; align-items: center; justify-content: space-between;
    padding: 0 32px;
    background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
    z-index: 10;
  }
  #tournamentName {
    font-size: 22px; font-weight: 900; color: #fbbf24;
    letter-spacing: 1px;
  }
  #topBarRight {
    display: flex; align-items: center; gap: 12px;
  }
  #phaseTag {
    font-size: 13px; font-weight: 700; color: #94a3b8;
    background: rgba(255,255,255,0.1); padding: 4px 12px; border-radius: 12px;
  }
  #phaseTag:empty {
    display: none;
  }
  #liveTime { font-size: 18px; color: rgba(255,255,255,0.7); }

  /* ── 状态A: 直播桌进行中 ────────────────────────────── */
  #state-live {
    position: absolute; inset: 0;
    display: none; flex-direction: column; align-items: center;
    padding-top: 60px;
  }
  #state-live .round-tag {
    font-size: 22px; color: #fbbf24; font-weight: bold;
    background: rgba(0,0,0,0.6); padding: 6px 20px; border-radius: 20px; margin-bottom: 16px;
  }
  #state-live .match-info {
    display: flex; align-items: center; gap: 60px;
    background: rgba(0,0,0,0.55); border-radius: 16px;
    padding: 20px 50px; border: 2px solid rgba(255,255,255,0.15);
  }
  #state-live .player-name {
    font-size: 72px; font-weight: 900; color: #ffffff;
    letter-spacing: 2px; min-width: 420px; text-align: center;
  }
  #state-live .vs-text { font-size: 48px; color: #94a3b8; font-weight: bold; }
  #state-live .live-player-container { display: flex; flex-direction: column; align-items: center; min-width: 420px; }
  #state-live .live-record { font-size: 24px; font-weight: 700; color: #94a3b8; margin-top: 2px; letter-spacing: 1px; }
  #state-live .live-record .w { color: #22c55e; }
  #state-live .live-record .d { color: #94a3b8; }
  #state-live .live-record .l { color: #ef4444; }
  #state-live .time {
    position: absolute; bottom: 30px; right: 50px;
    font-size: 24px; color: rgba(255,255,255,0.7);
    background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 8px;
  }

  /* ── 状态B: 胜者展示(直播桌打完弹全屏)─────────────── */
  #state-result {
    position: absolute; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(34,197,94,0.4) 0%, transparent 70%);
    animation: resultBg 0.5s ease;
  }
  @keyframes resultBg {
    from { opacity: 0; } to { opacity: 1; }
  }
  #state-result .result-card {
    background: rgba(0,0,0,0.8); border-radius: 28px;
    padding: 48px 100px; text-align: center;
    border: 4px solid #22c55e;
    animation: resultPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes resultPop {
    from { transform: scale(0.4); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  #state-result .winner-name { font-size: 108px; font-weight: 900; color: #22c55e; letter-spacing: 4px; animation: winnerPulse 0.8s ease-in-out infinite; }
  @keyframes winnerPulse {
    0%, 100% { text-shadow: 0 0 20px rgba(34,197,94,0.8); transform: scale(1); }
    50% { text-shadow: 0 0 60px rgba(34,197,94,1), 0 0 100px rgba(34,197,94,0.6); transform: scale(1.05); }
  }
  #state-result .win-text { font-size: 64px; color: #ffffff; font-weight: 900; margin-top: 10px; animation: winTextPulse 0.6s ease-in-out infinite; }
  @keyframes winTextPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.8; transform: scale(1.1); }
  }
  #state-result .vs-line { font-size: 36px; color: #475569; margin-bottom: 10px; }

  /* ── 状态C: 全场总览(竖排)─────────────────────────── */
  #state-overview {
    position: absolute; inset: 0;
    display: none; flex-direction: row;
    background: linear-gradient(180deg, rgba(15,23,42,0.94) 0%, rgba(15,23,42,0.87) 100%);
  }
  #state-overview .ov-left {
    width: 576px; flex-shrink: 0;
    display: flex; flex-direction: column;
    padding: 68px 24px 24px;
    border-right: 2px solid rgba(255,255,255,0.07);
    background: rgba(0,0,0,0.18);
  }
  #state-overview .ov-round-name { font-size: 36px; font-weight: 900; color: #f8fafc; line-height: 1.1; margin-bottom: 12px; }
  #ovRoundName { font-size: 36px; font-weight: 900; color: #f8fafc; line-height: 1.1; margin-bottom: 12px; }
  #state-overview .ov-round-tag {
    font-size: 18px; color: #fbbf24; font-weight: bold;
    background: rgba(0,0,0,0.45); padding: 5px 14px; border-radius: 12px;
    margin-bottom: 16px; display: inline-block;
  }
  #ovRoundTag {
    font-size: 18px; color: #fbbf24; font-weight: bold;
    background: rgba(0,0,0,0.45); padding: 5px 14px; border-radius: 12px;
    margin-bottom: 16px; display: inline-block;
  }
  #state-overview .ov-progress-text { font-size: 17px; color: #94a3b8; margin-bottom: 8px; }
  #ovProgressText { font-size: 17px; color: #94a3b8; margin-bottom: 8px; }
  #state-overview .ov-progress-bar { height: 7px; background: #334155; border-radius: 4px; margin-bottom: 6px; overflow: hidden; }
  #state-overview .ov-progress-fill { height: 100%; background: #22c55e; border-radius: 4px; transition: width 0.4s ease; }
  #state-overview .ov-player-list { margin-top: 16px; flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  #state-overview .ov-player-list::-webkit-scrollbar { width: 4px; }
  #state-overview .ov-player-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .ov-pitem { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 8px; background: rgba(30,41,59,0.7); }
  .ov-pitem.even { background: rgba(30,41,59,0.85); }
  .ov-rank { font-size: 18px; font-weight: 900; color: #475569; min-width: 30px; text-align: center; }
  .ov-rank.t3 { color: #fbbf24; }
  .ov-rank.t8 { color: #d97706; }
  .ov-pname { font-size: 18px; color: #e2e8f0; font-weight: 600; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ov-record { font-size: 15px; font-weight: 700; letter-spacing: 0.4px; color: #94a3b8; }
  .ov-record .w { color: #22c55e; }
  .ov-record .d { color: #94a3b8; }
  .ov-record .l { color: #ef4444; }
  .ov-pts { font-size: 15px; color: #64748b; min-width: 32px; text-align: right; font-weight: 600; }
  #state-overview .ov-right { flex: 1; display: flex; flex-direction: column; padding: 68px 36px 24px; overflow: hidden; }
  #state-overview .ov-table-list { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 14px; overflow-y: auto; align-content: start; }
  #state-overview .ov-table-list::-webkit-scrollbar { width: 4px; }
  #state-overview .ov-table-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
  .ov-card { display: flex; align-items: center; background: rgba(30,41,59,0.88); border-radius: 14px; padding: 16px 20px; border: 2px solid #334155; gap: 16px; transition: border-color 0.3s; }
  .ov-card.done { border-color: rgba(34,197,94,0.4); }
  .ov-card.live { border-color: #f59e0b; box-shadow: 0 0 22px rgba(245,158,11,0.28); }
  .ov-card .table-num { font-size: 34px; font-weight: 900; color: #334155; min-width: 50px; text-align: center; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 4px 0; line-height: 1; }
  .ov-card.live .table-num { color: #f59e0b; }
  .ov-card .player-block { flex: 1; min-width: 0; display: flex; flex-direction: row; align-items: center; gap: 8px; }
  .ov-card .prow { display: flex; align-items: center; gap: 8px; }
  .ov-card .p1n { font-size: 28px; font-weight: 800; color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ov-card .p1n.won { color: #fbbf24; }
  .ov-card .p1n.lost { color: #475569; text-decoration: line-through; }
  .ov-card .status-badge { font-size: 14px; font-weight: bold; padding: 4px 12px; border-radius: 8px; min-width: 66px; text-align: center; }
  .ov-card .status-badge.live { background: rgba(245,158,11,0.2); color: #f59e0b; border: 1px solid rgba(245,158,11,0.4); }
  .ov-card .status-badge.done { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
  .ov-card .status-badge.waiting { background: rgba(71,85,105,0.25); color: #64748b; border: 1px solid rgba(71,85,105,0.35); }
  .ov-card .winner-tag { font-size: 14px; font-weight: 900; color: #22c55e; min-width: 52px; text-align: center; }

  /* ── 状态D: 淘汰赛直播(顶部大比分)────────────────── */
  #state-top8-live {
    position: absolute; inset: 0;
    display: none; flex-direction: column; align-items: center; padding-top: 80px;
  }
  #state-top8-live .top8-phase {
    font-size: 22px; color: #fbbf24; font-weight: bold;
    background: rgba(0,0,0,0.6); padding: 6px 20px; border-radius: 20px;
    margin-bottom: 16px;
  }
  #state-top8-live .match-info {
    display: flex; align-items: center; gap: 40px;
    background: rgba(0,0,0,0.55); border-radius: 16px;
    padding: 20px 50px; border: 2px solid rgba(245,158,11,0.4);
  }
  #state-top8-live .player-name { font-size: 72px; font-weight: 900; color: #fff; min-width: 420px; text-align: center; }
  #state-top8-live .vs-text { font-size: 48px; color: #94a3b8; font-weight: bold; }
  #state-top8-live .bo3-score { font-size: 56px; font-weight: 900; color: #fff; min-width: 60px; text-align: center; }
  #state-top8-live .bo3-score.winning { color: #f59e0b; }

  /* ── 状态E: 淘汰赛胜者(直播桌BO3打完)──────────────── */
  #state-podium {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100vh;
    background: radial-gradient(ellipse at 50% 80%, #1e0a3c 0%, #0a001a 60%, #000 100%);
    position: relative;
    overflow: hidden;
  }
  .podium-title { font-size: 52px; font-weight: 900; color: #fbbf24; text-shadow: 0 0 40px rgba(251,191,36,0.6); margin-bottom: 40px; letter-spacing: 6px; }
  .podium-stage { display: flex; align-items: flex-end; gap: 16px; }
  .podium-spot { display: flex; flex-direction: column; align-items: center; }
  .podium-name { font-size: 26px; font-weight: 800; color: #f8fafc; margin-bottom: 8px; text-shadow: 0 2px 8px rgba(0,0,0,0.8); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .podium-medal { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 8px; }
  .podium-spot.second .podium-medal { background: linear-gradient(135deg, #c0c0c0, #8a8a8a); box-shadow: 0 0 20px rgba(192,192,192,0.5); }
  .podium-spot.first .podium-medal { background: linear-gradient(135deg, #fbbf24, #f59e0b); box-shadow: 0 0 30px rgba(251,191,36,0.7); }
  .podium-spot.third .podium-medal { background: linear-gradient(135deg, #cd7f32, #a0522d); box-shadow: 0 0 20px rgba(205,127,50,0.5); }
  .podium-stand { border-radius: 8px 8px 0 0; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px; font-size: 22px; font-weight: 900; color: rgba(255,255,255,0.9); }
  .podium-spot.second .podium-stand { width: 160px; height: 110px; background: linear-gradient(180deg, #8a8a8a, #555); }
  .podium-spot.first .podium-stand { width: 200px; height: 170px; background: linear-gradient(180deg, #f59e0b, #b45309); box-shadow: 0 0 40px rgba(245,158,11,0.4); }
  .podium-spot.third .podium-stand { width: 140px; height: 80px; background: linear-gradient(180deg, #a0522d, #6b3410); }
  .podium-spot.fourth .podium-stand { width: 140px; }
  .podium-label { font-size: 14px; font-weight: 700; color: rgba(255,255,255,0.6); margin-bottom: 6px; letter-spacing: 3px; }
  .podium-confetti { position: absolute; width: 100%; height: 100%; pointer-events: none; top: 0; left: 0; }
  .confetti-piece { position: absolute; width: 8px; height: 8px; border-radius: 2px; animation: confettiFall 3s ease-in forwards; }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
  @keyframes podiumPulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }
  .podium-spot.first .podium-stand { animation: podiumPulse 2s ease-in-out infinite; }

  #state-top8-result {
    position: absolute; inset: 0;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at center, rgba(245,158,11,0.35) 0%, transparent 70%);
  }
  #state-top8-result .result-card {
    background: rgba(0,0,0,0.78); border-radius: 28px; padding: 48px 100px; text-align: center;
    border: 3px solid #d97706; animation: resultPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  #state-top8-result .winner-name { font-size: 108px; font-weight: 900; color: #fbbf24; letter-spacing: 4px; }
  #state-top8-result .score-line { font-size: 36px; color: #94a3b8; margin-top: 6px; }
  #state-top8-result .win-text { font-size: 52px; color: #ffffff; font-weight: bold; margin-top: 10px; }

  /* ── 状态F: 淘汰赛对阵图(全览)─────────────────────── */
  #state-top8-bracket {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    background: linear-gradient(180deg, rgba(15,23,42,0.97) 0%, rgba(15,23,42,0.94) 100%);
    padding: 24px 34px 26px;
  }
  #bracketPhaseLabel {
    position: absolute;
    left: 50%;
    top: 26px;
    transform: translateX(-50%);
    font-size: 18px;
    font-weight: 900;
    color: #fbbf24;
    letter-spacing: 0.18em;
    padding: 8px 18px;
    border-radius: 999px;
    background: rgba(0,0,0,0.32);
    z-index: 5;
  }
  #bracketStages {
    flex: 1;
    position: relative;
    display: block;
    width: 100%;
    height: 100%;
    padding-top: 56px;
  }
  .bracket-column {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
  }
  .bracket-column.center {
    justify-content: center;
  }
  .bracket-lane-title {
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    font-weight: 800;
    color: rgba(148,163,184,0.55);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    white-space: nowrap;
  }
  .bracket-side-stack {
    display: flex;
    flex-direction: column;
    gap: 22px;
    justify-content: space-around;
    height: 100%;
    padding-top: 28px;
  }
  .bracket-semifinal-stack {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    height: 100%;
    padding-top: 28px;
  }
  .bracket-center-stack {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 54px;
    height: 100%;
    padding-top: 28px;
  }
  .bracket-match-wrap {
    position: relative;
    display: flex;
    align-items: center;
    min-height: 120px;
  }
  .bracket-match-wrap.compact {
    min-height: 92px;
  }
  .bracket-card-wrap {
    position: relative;
    width: 100%;
  }
  .bracket-card {
    background: rgba(30,41,59,0.92); border-radius: 10px; border: 2px solid #334155;
    padding: 10px 14px; flex: 1; display: flex; flex-direction: column; gap: 5px;
    transition: border-color 0.3s;
    min-height: 78px;
  }
  .bracket-card.done { border-color: rgba(34,197,94,0.5); }
  .bracket-card.live { border-color: #f59e0b; box-shadow: 0 0 14px rgba(245,158,11,0.25); }
  .bracket-card.bronze { border-color: rgba(217,119,6,0.45); background: rgba(64,32,8,0.5); }
  .bracket-card.final { border-color: rgba(251,191,36,0.45); background: rgba(62,47,10,0.45); }
  .bracket-player {
    display: flex;
    align-items: center;
    gap: 8px;
    min-height: 26px;
  }
  .bracket-player + .bracket-player {
    border-top: 1px solid rgba(148,163,184,0.14);
    padding-top: 6px;
  }
  .bracket-player .bp-name {
    flex: 1;
    font-size: 20px;
    font-weight: 800;
    color: #f8fafc;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bracket-player .bp-name.lost { color: #475569; text-decoration: line-through; }
  .bracket-player .bp-name.won { color: #f8fafc; }
  .bracket-player .bp-name.live-now { color: #f59e0b; }
  .bracket-player .bp-score {
    font-size: 17px;
    font-weight: 900;
    color: #cbd5e1;
    min-width: 22px;
    text-align: center;
  }
  .bracket-player .bp-score.win { color: #fbbf24; }
  .bracket-player .bp-win-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; flex-shrink: 0; }
  .bracket-connector {
    position: absolute;
    top: 50%;
    width: 24px;
    height: 2px;
    background: rgba(251,191,36,0.45);
    transform: translateY(-50%);
  }
  .bracket-connector.left-out { right: -24px; }
  .bracket-connector.right-in { left: -24px; }
  .bracket-connector.dim { background: rgba(148,163,184,0.28); }
  .bracket-tree {
    position: relative;
    flex: 1;
    width: 100%;
    height: 100%;
  }
  .bracket-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  .bracket-lines {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .tree-line {
    position: absolute;
    background: rgba(251,191,36,0.52);
    border-radius: 999px;
  }
  .bridge-layer {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 1;
  }
  .bridge-box {
    position: absolute;
    border: 1px solid #334155;
    background: rgba(30,41,59,0.94);
    border-radius: 0;
    box-shadow: 0 10px 28px rgba(0,0,0,0.16);
  }
  .bridge-box.anim-v,
  .bridge-box.anim-h {
    opacity: 0;
    transform-origin: center;
    animation-fill-mode: both;
    animation-timing-function: linear;
  }
  .bridge-box.anim-v {
    transform-origin: top center;
    animation-name: bridgeGrowV;
  }
  .bridge-box.anim-v.from-bottom {
    transform-origin: bottom center;
  }
  .bridge-box.anim-h {
    transform-origin: left center;
    animation-name: bridgeGrowH;
  }
  .bridge-box.anim-h.reverse {
    transform-origin: right center;
  }
  .bridge-box.solid {
    border: 0;
    background: #334155;
    box-shadow: none;
  }
  .bridge-box.win-route {
    border-color: #22c55e;
    background: rgba(34,197,94,0.26);
    box-shadow: 0 0 18px rgba(34,197,94,0.20);
    z-index: 2;
  }
  .bridge-box.solid.win-route {
    background: #22c55e;
    box-shadow: 0 0 12px rgba(34,197,94,0.25);
  }
  .tree-node,
  .tree-split {
    position: absolute;
    background: rgba(30,41,59,0.94);
    border: 2px solid #334155;
    border-radius: 12px;
    box-shadow: 0 10px 28px rgba(0,0,0,0.16);
  }
  .phase-qf,
  .phase-sf,
  .phase-final {
    opacity: 0;
    transform: translateY(-10px);
    animation: bracketFadeIn 0.42s ease forwards;
  }
  .phase-qf { animation-delay: 0.00s; }
  .phase-sf { animation-delay: 0.16s; }
  .phase-final { animation-delay: 0.32s; }
  @keyframes bracketFadeIn {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  @keyframes bridgeGrowV {
    from {
      opacity: 0;
      transform: scaleY(0);
    }
    to {
      opacity: 1;
      transform: scaleY(1);
    }
  }
  @keyframes bridgeGrowH {
    from {
      opacity: 0;
      transform: scaleX(0);
    }
    to {
      opacity: 1;
      transform: scaleX(1);
    }
  }

<script src="/shared/qrcode.js"></script>
<script>
let clockInterval;
const overlayRouteMatch = location.pathname.match(/^\/t\/([^/]+)\/overlay\/?$/);
const overlayTournamentId = overlayRouteMatch ? decodeURIComponent(overlayRouteMatch[1]) : '';
if (!overlayTournamentId) {
  document.body.innerHTML = '<div style="padding:40px;color:#fff;font-family:sans-serif;">Tournament not found</div>';
}
let top8AnimatedPhase = null;
let top8BridgeTimer = null;

// ── 轮询 ─────────────────────────────────────────────────
let currentState = null;
async function poll() {
  try {
    const stateUrl = `/api/tournaments/${encodeURIComponent(overlayTournamentId)}/state`;
    const res = await fetch(stateUrl);
    const s = await res.json();
    if (JSON.stringify(s) !== JSON.stringify(currentState)) {
      currentState = s;
      render(currentState);
    }
  } catch(e) {}
}
const POLL_INTERVAL = 2000;
setInterval(poll, POLL_INTERVAL);
poll();
setInterval(() => {
  const now = new Date();
  const t = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  document.getElementById('liveTime') && (document.getElementById('liveTime').textContent = t);
  document.getElementById('liveTime2') && (document.getElementById('liveTime2').textContent = t);
}, 1000);

// ── WDL ─────────────────────────────────────────────────
function getRecord(player, matches) {
  let w = 0, d = 0, l = 0;
  for (const m of matches) {
    if (!m.done) continue;
    if (m.draw) { if (m.p1 === player || m.p2 === player) d++; continue; }
    if (m.winner === player) w++;
    else if (m.p1 === player || m.p2 === player) l++;
  }
  return { w, d, l, pts: w * 3 + d };
}

function renderQrInto(containerId, text) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  if (!text) return;
  const qr = qrcode(0, 'M');
  qr.addData(text);
  qr.make();
  container.innerHTML = qr.createSvgTag({ cellSize: 6, margin: 0, scalable: true });
  const svg = container.querySelector('svg');
  if (svg) {
    svg.style.width = '100%';
    svg.style.height = '100%';
    svg.style.display = 'block';
  }
}
function recCmp(a, b, matches) {
  if (a === 'BYE') return 1;
  if (b === 'BYE') return -1;
  const ra = getRecord(a, matches), rb = getRecord(b, matches);
  if (rb.pts !== ra.pts) return rb.pts - ra.pts;
  const aB = matches.filter(m => m.done && !m.draw && m.winner === a && m.p1 !== 'BYE' && m.p2 !== 'BYE' && m.p1 !== 'DROPPED' && m.p2 !== 'DROPPED' &&
    ((m.p1===a&&m.p2===b)||(m.p2===a&&m.p1===b))).length;
  const bB = matches.filter(m => m.done && !m.draw && m.winner === b && m.p1 !== 'BYE' && m.p2 !== 'BYE' && m.p1 !== 'DROPPED' && m.p2 !== 'DROPPED' &&
    ((m.p1===b&&m.p2===a)||(m.p2===b&&m.p1===a))).length;
  return bB - aB;
}

// ── 渲染入口 ─────────────────────────────────────────────
function render(s) {

  try { // try-catch 防止静默失败
      const allIds = [
    'topBar','state-live','state-result','state-overview',
    'state-top8-live','state-top8-result','state-top8-bracket',
    'state-swiss-ended','state-idle','state-podium'
  ];
  allIds.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });

  // 通用顶栏
  document.getElementById('tournamentName').textContent = s.tournamentName || '-';
  const phaseLabels = { setup:'等待开始', swiss:'瑞士轮', 'swiss-ended':'瑞士轮结束', top8:'淘汰赛', done:'已完成' };
  const phaseTagEl = document.getElementById('phaseTag');
  phaseTagEl.textContent = s.phase === 'top8' ? '' : (phaseLabels[s.phase] || '-');
  phaseTagEl.style.display = phaseTagEl.textContent ? '' : 'none';
  document.getElementById('topBar').style.display = 'flex';

  const ov = s.overlayState;

  // 空闲（top8 阶段不进入 idle，显示总览）
  if (s.phase === 'setup' || (ov === 'idle' && s.phase !== 'top8')) {
    const baseUrl = s.publicBaseUrl || location.origin;
    const playerUrl = `${baseUrl}/t/${encodeURIComponent(s.tournamentId)}/player-login`;
    document.getElementById('idleTitle').textContent = s.tournamentName || '等待开始';
    document.getElementById('idleSub').textContent = '报名阶段';
    renderQrInto('idleQrImage', playerUrl);
    document.getElementById('state-idle').style.display = 'flex';
    document.getElementById('topBar').style.display = 'none';
    return;
  }

  // 瑞士轮
  if (s.phase === 'swiss') {
    // 直播桌胜(全屏弹)- 改用 lastResult,不依赖 currentLiveMatch
    if (ov === 'result' && s.lastResult) {
      document.getElementById('state-result').style.display = 'flex';
      document.getElementById('resultWinner').textContent = s.lastResult.winner || '-';
      document.getElementById('resultVs').textContent = `${s.lastResult.p1} vs ${s.lastResult.p2}`;
      document.getElementById('resultWinText').textContent = '胜!';
      return;
    }
    // 淘汰赛直播桌(瑞士轮转播桌)- 改用 liveMatch 快照
    const liveMatch = s.currentLiveMatch || s.lastLiveMatch;
    if (ov === 'live' && liveMatch) {
      document.getElementById('state-live').style.display = 'flex';
      document.getElementById('liveRoundTag').textContent = `Round ${liveMatch.round || s.round}`;
      // 设置选手1
      const p1 = liveMatch.p1 || '-';
      const p1Rec = p1 !== '-' ? getRecord(p1, s.matches) : null;
      document.getElementById('liveP1Name').textContent = p1;
      document.getElementById('liveP1Record').innerHTML = p1Rec ? `<span class="w">${p1Rec.w}</span>-<span class="d">${p1Rec.d}</span>-<span class="l">${p1Rec.l}</span>` : '';

      // 设置选手2
      const p2 = liveMatch.p2 || '-';
      const p2Rec = p2 !== '-' ? getRecord(p2, s.matches) : null;
      document.getElementById('liveP2Name').textContent = p2;
      document.getElementById('liveP2Record').innerHTML = p2Rec ? `<span class="w">${p2Rec.w}</span>-<span class="d">${p2Rec.d}</span>-<span class="l">${p2Rec.l}</span>` : '';
      return;
    }
    // 全场总览
    renderOverview(s);
    document.getElementById('state-overview').style.display = 'flex';
    return;
  }

  // 瑞士轮结束
  if (s.phase === 'swiss-ended' || ov === 'swiss-ended') {
    renderSwissEnded(s);
    document.getElementById('state-swiss-ended').style.display = 'flex';
    return;
  }

  // 淘汰赛
  if (s.phase === 'top8') {
    // 决赛和季军战都结束 → 显示领奖台
    const finalsDone = s.matches.filter(m => m.phase === 'Finals' && m.done).length > 0;
    const bronzeDone = s.matches.filter(m => m.phase === 'Bronze Match' && m.done).length > 0;
    if (finalsDone && bronzeDone) {
      renderPodium(s);
      document.getElementById('state-podium').style.display = 'flex';
      return;
    }

    const live = s.currentLiveMatch;
    if (ov === 'top8-result' && (live || s.lastResult)) {
      const info = live || s.lastResult;
      // Finals done → show podium
      const isFinals = info.phase === 'Finals';
      if (isFinals) {
        renderPodium(s);
        document.getElementById('state-podium').style.display = 'flex';
        return;
      }
      document.getElementById('state-top8-result').style.display = 'flex';
      document.getElementById('top8ResultWinner').textContent = info.winner || '-';
      document.getElementById('top8ResultScore').textContent = `${info.p1} ${info.p1Wins || 0} - ${info.p2Wins || 0} ${info.p2}`;
      document.getElementById('top8ResultWinText').textContent = '胜!';
      return;
    }
    if (ov === 'top8-live' && live) {
      document.getElementById('state-top8-live').style.display = 'flex';
      document.getElementById('top8Phase').textContent = (live.phase || '淘汰赛').toUpperCase();
      document.getElementById('top8P1').textContent = live.p1 || '-';
      document.getElementById('top8P2').textContent = live.p2 || '-';
      document.getElementById('top8P1Score').textContent = live.p1Wins || 0;
      document.getElementById('top8P2Score').textContent = live.p2Wins || 0;
      var s1 = document.getElementById('top8P1Score');
      var s2 = document.getElementById('top8P2Score');
      s1.className = ''; s2.className = '';
      if ((live.p1Wins || 0) >= 2) s1.style.color = '#f59e0b'; else s1.style.color = '#fff';
      if ((live.p2Wins || 0) >= 2) s2.style.color = '#f59e0b'; else s2.style.color = '#fff';
      return;
    }
    // 全局总览(直播桌胜利画面后切回这里)
    if (ov === 'overview') {
      try {
        renderTop8Bracket(s);
        document.getElementById('state-top8-bracket').style.display = 'flex';
      } catch (e) {
        renderTop8Overview(s);
        document.getElementById('state-overview').style.display = 'flex';
      }
      return;
    }
    // 默认:显示新的树形八强对阵图
    try {
      renderTop8Bracket(s);
      document.getElementById('state-top8-bracket').style.display = 'flex';
    } catch (e) {
      renderTop8Overview(s);
      document.getElementById('state-overview').style.display = 'flex';
    }
    return;
  }

  // done
  document.getElementById('idleTitle').textContent = '🏆 比赛结束';
  document.getElementById('idleSub').textContent = s.tournamentName || '';
  document.getElementById('state-idle').style.display = 'flex';
  } catch(e) { document.getElementById("state-idle").style.display="flex"; document.getElementById("idleTitle").textContent="JS错误"; document.getElementById("idleSub").textContent=e.message; }
}

// ── 全场总览(瑞士轮竖排)───────────────────────────────

// ── 淘汰赛全场总览 ─────────────────────────────────────
// ── 淘汰赛全场总览（左右分栏：左侧积分榜 | 右侧对阵图）─────
function renderTop8Overview(s) {
  const el = document.getElementById('state-overview');
  const ovLeft = el.querySelector('.ov-left');
  const ovRight = el.querySelector('.ov-right');
  // 淘汰赛总览：隐藏左栏，右栏占满全屏
  if (ovLeft) { ovLeft.style.display = 'none'; }
  if (ovRight) { ovRight.style.display = 'flex'; ovRight.style.flex = '1'; ovRight.style.padding = '24px 32px'; ovRight.style.width = '100%'; }

  const p8 = s.top8 || [];
  const allMatches = s.matches || [];
  const live = s.currentLiveMatch;

  // 全屏淘汰赛对阵图 — 纵向排列各阶段
  var rightList = document.getElementById('ovTableList');
  if (rightList) {
    rightList.style.gridTemplateColumns = '1fr';
    rightList.style.gap = '16px';
    var stages = [
      { label: '四分之一决赛', phase: 'Quarter Finals', cols: 4 },
      { label: '半决赛',        phase: 'Semi Finals', cols: 2 },
      { label: '季军战',        phase: 'Bronze Match', cols: 1 },
      { label: '决赛',          phase: 'Finals', cols: 1 },
    ];
    rightList.innerHTML = stages.map(function(stage) {
      var ms = allMatches.filter(function(m) { return m.phase === stage.phase; });
      if (ms.length === 0) {
        return '<div style="background:rgba(30,41,59,0.6);border-radius:16px;padding:16px 24px;border:2px solid #334155;font-family:inherit;">' +
          '<div style="font-size:20px;color:#fbbf24;font-weight:700;margin-bottom:12px;letter-spacing:1px;font-family:inherit;">' + stage.label + '</div>' +
          '<div style="text-align:center;color:#475569;font-size:18px;padding:12px;font-family:inherit;">待开始</div>' +
          '</div>';
      }
      var cardsHtml = ms.map(function(m) {
        var isLiveMatch = live && live.id === m.id;
        var p1Won = m.winner === m.p1;
        var p2Won = m.winner === m.p2;
        var p1Color = p1Won ? 'color:#22c55e;font-weight:900;' : (m.winner && !p1Won ? 'color:#64748b;' : 'color:#e2e8f0;');
        var p2Color = p2Won ? 'color:#22c55e;font-weight:900;' : (m.winner && !p2Won ? 'color:#64748b;' : 'color:#e2e8f0;');
        var liveBorder = isLiveMatch ? 'border-color:#f59e0b;box-shadow:0 0 18px rgba(245,158,11,0.4);' : 'border-color:#334155;';
        return '<div style="display:flex;align-items:center;background:rgba(30,41,59,0.85);border-radius:12px;padding:12px 16px;border:2px solid;font-family:inherit;' + liveBorder + '">' +
          '<div style="flex:1;text-align:center;font-size:20px;font-weight:800;font-family:inherit;' + p1Color + '">' + (m.p1 || '??') + (p1Won ? ' ✓' : '') + '</div>' +
          '<div style="font-size:16px;color:#475569;font-weight:600;padding:0 12px;font-family:inherit;">VS</div>' +
          '<div style="flex:1;text-align:center;font-size:20px;font-weight:800;font-family:inherit;' + p2Color + '">' + (m.p2 || '??') + (p2Won ? ' ✓' : '') + '</div>' +
          '</div>';
      }).join('');
      // 四分之一决赛4列，半决赛2列，其他单列
      var innerGrid = stage.cols === 4 
        ? 'display:grid;grid-template-columns:repeat(4,1fr);gap:10px;'
        : stage.cols === 2
        ? 'display:grid;grid-template-columns:repeat(2,1fr);gap:10px;'
        : 'display:flex;flex-direction:column;gap:10px;';
      return '<div style="background:rgba(30,41,59,0.6);border-radius:16px;padding:16px 24px;border:2px solid #334155;font-family:inherit;">' +
        '<div style="font-size:20px;color:#fbbf24;font-weight:700;margin-bottom:12px;letter-spacing:1px;font-family:inherit;">' + stage.label + '</div>' +
        '<div style="' + innerGrid + '">' + cardsHtml + '</div>' +
        '</div>';
    }).join('');
  }
}



function renderOverview(s) {
  // 淘汰赛阶段：显示专用总览 
  if (s.phase === 'top8') { 
    renderTop8Overview(s); 
    return; 
  } 

  // 恢复瑞士轮左右分栏（淘汰赛总览可能隐藏了它们）
  const el = document.getElementById('state-overview');
  const ovLeft = el.querySelector('.ov-left');
  const ovRight = el.querySelector('.ov-right');
  if (ovLeft) { ovLeft.style.display = ''; }
  if (ovRight) { ovRight.style.display = ''; }
  // 右侧对阵表2列
  var tl = document.getElementById('ovTableList');
  if (tl) { tl.style.display = 'grid'; tl.style.gridTemplateColumns = '1fr 1fr'; tl.style.gap = '8px'; }
  const bracketEl = document.getElementById('top8-overview-bracket');
  if (bracketEl) bracketEl.style.display = 'none';

  document.getElementById('ovRoundName').textContent = '瑞士轮'; 
  document.getElementById('ovRoundTag').textContent = `Round ${s.round}`;

  const rms = s.matches.filter(m => m.round === s.round);
  const done = rms.filter(m => m.done).length;
  const total = rms.length;
  document.getElementById('ovProgressText').textContent = `${done}/${total} 已完成`;
  document.getElementById('ovProgressFill').style.width = total > 0 ? `${(done/total)*100}%` : '0%';

  // 左侧积分榜 2列(排除 BYE/DROPPED)
  const dropped = new Set(s.droppedPlayers || []);
  const sorted = [...s.players].filter(p => p !== 'BYE' && !dropped.has(p)).sort((a, b) => recCmp(a, b, s.matches));
  var plEl = document.getElementById('ovPlayerList');
  plEl.style.display = 'grid';
  plEl.style.gridTemplateColumns = '1fr 1fr';
  plEl.style.gap = '4px';
  plEl.innerHTML = sorted.map(function(p, i) {
    var rec = getRecord(p, s.matches);
    var rc = i < 3 ? 't3' : i < 8 ? 't8' : '';
    return '<div class="ov-pitem ' + (i % 2 === 0 ? 'even' : '') + '">' +
      '<span class="ov-rank ' + rc + '">' + (i+1) + '</span>' +
      '<span class="ov-pname" title="' + p + '" style="font-family:inherit;">' + p + '</span>' +
      '<span class="ov-record" style="font-family:inherit;"><span class="w">' + rec.w + '</span>-<span class="d">' + rec.d + '</span>-<span class="l">' + rec.l + '</span></span>' +
      '<span class="ov-pts" style="font-family:inherit;">' + rec.pts + 'pt</span>' +
      '</div>';
  }).join('');

  // 右侧每桌(双列网格,含 BYE 处理)
  // 桌号排序：成绩好的在上面，轮空排最后面
  const getMatchScore = (m) => {
    if (m.p1 === 'BYE' || m.p2 === 'BYE') return -Infinity;
    const p1Rec = getRecord(m.p1, s.matches);
    const p2Rec = getRecord(m.p2, s.matches);
    const pts = Math.max(p1Rec ? p1Rec.pts : 0, p2Rec ? p2Rec.pts : 0);
    const w = Math.max(p1Rec ? p1Rec.w : 0, p2Rec ? p2Rec.w : 0);
    return pts * 1000 + w; // 按积分+胜场排序
  };
  const sortedM = [...rms].sort((a, b) => getMatchScore(b) - getMatchScore(a));
  document.getElementById('ovTableList').innerHTML = sortedM.map(m => {
    const isLive = s.currentLiveMatch && s.currentLiveMatch.id === m.id;
    const isBye = m.p1 === 'BYE' || m.p2 === 'BYE';
    const p1W = m.winner === m.p1, p2W = m.winner === m.p2;
    let badge = '';
    if (isBye) badge = '<span class="status-badge done">(轮空)</span>';
    else if (isLive) badge = '<span class="status-badge live">直播中</span>';
    else if (m.done) badge = '<span class="status-badge done">已结束</span>';
    else badge = '<span class="status-badge waiting">等待中</span>';
        const dropped2 = new Set(s.droppedPlayers || []);
    const p1d = m.p1 === 'BYE' ? '<span style="color:#475569;font-style:italic">(轮空)</span>'
      : dropped2.has(m.p1) ? '<span style="color:#64748b;font-style:italic;text-decoration:line-through">' + m.p1 + '</span>'
      : (m.p1 || 'TBD');
    const p2d = m.p2 === 'BYE' ? '<span style="color:#475569;font-style:italic">(轮空)</span>'
      : dropped2.has(m.p2) ? '<span style="color:#64748b;font-style:italic;text-decoration:line-through">' + m.p2 + '</span>'
      : (m.p2 || 'TBD');
    return `<div class="ov-card${isBye || m.done ? ' done' : ''}${isLive ? ' live' : ''}">
      <div class="table-num">${m.table || '?'}</div>
      <div class="player-block">
        <span class="p1n${p1W ? ' won' : p2W ? ' lost' : ''}" style="font-size:20px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p1d}</span>
        <span style="color:#64748b;font-size:13px;font-weight:700;flex-shrink:0;margin:0 4px;">VS</span>
        <span class="p1n${p2W ? ' won' : p1W ? ' lost' : ''}" style="font-size:20px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p2d}</span>
      </div>
      ${badge}
    </div>`;
  }).join('');
}

function renderPodium(s) {
  const finalMatch = s.matches.find(m => m.phase === 'Finals' && m.done);
  const bronzeMatch = s.matches.find(m => m.phase === 'Bronze Match' && m.done);
  const getLoser = (m) => m.winner === m.p1 ? m.p2 : m.p1;

  const first = finalMatch ? finalMatch.winner : '-';
  const second = finalMatch ? getLoser(finalMatch) : '-';
  const third = bronzeMatch ? bronzeMatch.winner : '-';
  const fourth = bronzeMatch ? getLoser(bronzeMatch) : '-';

  // 提取5-8名：四分之一决赛的败者
  const qfMatches = s.matches.filter(m => m.phase === 'Quarter Finals' && m.done);
  const top8Set = new Set(s.top8 || []);
  const top4Set = new Set([first, second, third, fourth]);
  const fifthToEighth = qfMatches.map(m => {
    if (m.winner === m.p1) return m.p2;
    if (m.winner === m.p2) return m.p1;
    return null;
  }).filter(p => p && p !== 'BYE' && top8Set.has(p) && !top4Set.has(p));

  const el = document.getElementById('state-podium');
  el.innerHTML = '<div class="podium-confetti" id="confetti"></div>' +
    '<div class="podium-title">最终排名</div>' +
    '<div style="display:flex;flex-direction:column;align-items:center;gap:24px;">' +
      '<div class="podium-stage">' +
        '<div class="podium-spot second">' +
          '<div class="podium-label">2ND</div>' +
          '<div class="podium-name">' + second + '</div>' +
          '<div class="podium-medal">🥈</div>' +
          '<div class="podium-stand">' + second + '</div>' +
        '</div>' +
        '<div class="podium-spot first">' +
          '<div class="podium-label">1ST</div>' +
          '<div class="podium-name">' + first + '</div>' +
          '<div class="podium-medal">🏆</div>' +
          '<div class="podium-stand">' + first + '</div>' +
        '</div>' +
        '<div class="podium-spot third">' +
          '<div class="podium-label">3RD</div>' +
          '<div class="podium-name">' + third + '</div>' +
          '<div class="podium-medal">🥉</div>' +
          '<div class="podium-stand">' + third + '</div>' +
        '</div>' +
        '<div class="podium-spot fourth">' +
          '<div class="podium-label">4TH</div>' +
          '<div class="podium-name">' + fourth + '</div>' +
          '<div class="podium-medal">🎖️</div>' +
          '<div class="podium-stand" style="width:140px;height:60px;background:linear-gradient(180deg,#4b5563,#374151);">' + fourth + '</div>' +
        '</div>' +
      '</div>' +
      // 5-8名名单 - 挨着领奖台，一人一个框，纵向排
      '<div style="background:rgba(30,41,59,0.95);border-radius:16px;padding:18px 28px;border:2px solid #64748b;width:100%;max-width:750px;">' +
        '<div style="font-size:22px;color:#94a3b8;font-weight:700;margin-bottom:14px;text-align:center;">八强选手</div>' +
        '<div style="display:flex;flex-direction:column;gap:10px;">' +
          fifthToEighth.map(p => '<div style="background:rgba(51,65,85,0.9);border-radius:12px;padding:16px 28px;font-size:26px;color:#e2e8f0;font-weight:700;text-align:center;border:1px solid #64748b;">' + p + '</div>').join('') +
        '</div>' +
      '</div>' +
    '</div>';
  spawnConfetti();
}

function spawnConfetti() {
  const el = document.getElementById('confetti');
  if (!el) return;
  const colors = ['#fbbf24','#f59e0b','#ffffff','#ef4444','#22c55e','#3b82f6','#a855f7','#ec4899'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 3 + 's';
    piece.style.animationDuration = (2 + Math.random() * 2) + 's';
    el.appendChild(piece);
  }
}

function renderTop8Bracket(s) {
  const qf = s.matches.filter(m => m.phase === 'Quarter Finals').sort((a, b) => (a.table || 0) - (b.table || 0));
  const sf = s.matches.filter(m => m.phase === 'Semi Finals').sort((a, b) => (a.table || 0) - (b.table || 0));
  const finalMatch = s.matches.find(m => m.phase === 'Finals') || null;
  const bronzeMatch = s.matches.find(m => m.phase === 'Bronze Match') || null;
  const live = s.currentLiveMatch;
  const labelMap = { 'Quarter Finals': '四分之一决赛', 'Semi Finals': '半决赛', 'Bronze Match': '季军赛', 'Finals': '决赛' };
  const currentPhase = (() => {
    if (finalMatch && !finalMatch.done && (finalMatch.p1 || finalMatch.p2)) return 'Finals';
    if (bronzeMatch && !bronzeMatch.done && (bronzeMatch.p1 || bronzeMatch.p2)) return 'Bronze Match';
    if (sf.some(m => !m.done && (m.p1 || m.p2))) return 'Semi Finals';
    return 'Quarter Finals';
  })();
  const shouldAnimateStage = top8AnimatedPhase !== currentPhase;
  if (top8BridgeTimer) {
    clearTimeout(top8BridgeTimer);
    top8BridgeTimer = null;
  }
  if (shouldAnimateStage) {
    top8BracketAnimated = false;
    top8LinesAnimated = false;
  }
  top8AnimatedPhase = currentPhase;
  document.getElementById('bracketPhaseLabel').textContent = labelMap[currentPhase] || currentPhase;

  const qf1 = qf[0] || null;
  const qf2 = qf[1] || null;
  const qf3 = qf[2] || null;
  const qf4 = qf[3] || null;
  const sf1 = sf[0] || null;
  const sf2 = sf[1] || null;
  const qfAnim = shouldAnimateStage ? 'phase-qf' : '';
  const sfAnim = shouldAnimateStage ? 'phase-sf' : '';
  const finalAnim = shouldAnimateStage ? 'phase-final' : '';

  const nodeClass = (name, winnerName, liveMatch, sideName) => {
    if (!name) return 'tree-node';
    const classes = ['tree-node'];
    if (winnerName && name === winnerName) classes.push('won');
    if (winnerName && name !== winnerName) classes.push('muted');
    if (liveMatch && name === sideName) classes.push('live');
    return classes.join(' ');
  };
  const halfClass = (name, winnerName, liveMatch, sideName) => {
    if (!name) return 'tree-half';
    const classes = ['tree-half'];
    if (winnerName && name === winnerName) classes.push('won');
    if (winnerName && name !== winnerName) classes.push('muted');
    if (liveMatch && name === sideName) classes.push('live');
    return classes.join(' ');
  };

  const points = {
    qf1p1: { x: 70, y: 90 }, qf1p2: { x: 70, y: 280 },
    qf2p1: { x: 70, y: 470 }, qf2p2: { x: 70, y: 660 },
    sf1p1: { x: 445, y: 185 }, sf1p2: { x: 445, y: 565 },
    qf3p1: { x: 1600, y: 90 }, qf3p2: { x: 1600, y: 280 },
    qf4p1: { x: 1600, y: 470 }, qf4p2: { x: 1600, y: 660 },
    sf2p1: { x: 1225, y: 185 }, sf2p2: { x: 1225, y: 565 },
    final: { x: 780, y: 370 },
    bronze: { x: 780, y: 610 },
  };

  const node = (id, name, score, cls, x, y, phaseClass = '', reverse = false) =>
    `<div id="${id}" class="${cls}${reverse ? ' reverse' : ''}${phaseClass ? ` ${phaseClass}` : ''}" style="left:${x}px; top:${y}px;"><span class="tree-node-name">${name || '待定'}</span><span class="tree-node-score ${score > 0 ? 'win' : ''}">${score || 0}</span></div>`;
  const pairBox = (id, match, boxClass, x, y, phaseClass = '') => `
    <div id="${id}" class="tree-split ${boxClass}${phaseClass ? ` ${phaseClass}` : ''}" style="left:${x}px; top:${y}px;">
      <div class="${halfClass(match?.p1, match?.winner, live, match?.p1)}"><span class="tree-half-name">${match?.p1 || '待定'}</span><span class="tree-half-score ${match?.winner === match?.p1 ? 'win' : ''}">${match?.p1Wins || 0}</span></div>
      <div class="${halfClass(match?.p2, match?.winner, live, match?.p2)}"><span class="tree-half-name">${match?.p2 || '待定'}</span><span class="tree-half-score ${match?.winner === match?.p2 ? 'win' : ''}">${match?.p2Wins || 0}</span></div>
    </div>
  `;

  const container = document.getElementById('bracketStages');
  container.innerHTML = `
    <div class="bracket-tree" id="bracketTree">
      <svg class="bracket-svg" id="bracketSvg" viewBox="0 0 1920 900" preserveAspectRatio="none"></svg>
      <div class="bridge-layer" id="bridgeLayer"></div>
      <div class="tree-round-label" style="left:185px; top:48px; transform:translateX(-50%);">四分之一决赛</div>
      <div class="tree-round-label" style="left:560px; top:48px; transform:translateX(-50%);">半决赛</div>
      <div class="tree-round-label" style="left:960px; top:48px; transform:translateX(-50%);">决赛</div>
      <div class="tree-round-label" style="left:1340px; top:48px; transform:translateX(-50%);">半决赛</div>
      <div class="tree-round-label" style="left:1715px; top:48px; transform:translateX(-50%);">四分之一决赛</div>

      ${node('qf1p1', qf1?.p1, qf1?.p1Wins || 0, nodeClass(qf1?.p1, qf1?.winner, live, qf1?.p1), points.qf1p1.x, points.qf1p1.y, qfAnim)}
      ${node('qf1p2', qf1?.p2, qf1?.p2Wins || 0, nodeClass(qf1?.p2, qf1?.winner, live, qf1?.p2), points.qf1p2.x, points.qf1p2.y, qfAnim)}
      ${node('qf2p1', qf2?.p1, qf2?.p1Wins || 0, nodeClass(qf2?.p1, qf2?.winner, live, qf2?.p1), points.qf2p1.x, points.qf2p1.y, qfAnim)}
      ${node('qf2p2', qf2?.p2, qf2?.p2Wins || 0, nodeClass(qf2?.p2, qf2?.winner, live, qf2?.p2), points.qf2p2.x, points.qf2p2.y, qfAnim)}

      ${node('sf1p1', sf1?.p1, sf1?.p1Wins || 0, nodeClass(sf1?.p1, sf1?.winner, live, sf1?.p1), points.sf1p1.x, points.sf1p1.y, sfAnim)}
      ${node('sf1p2', sf1?.p2, sf1?.p2Wins || 0, nodeClass(sf1?.p2, sf1?.winner, live, sf1?.p2), points.sf1p2.x, points.sf1p2.y, sfAnim)}

      ${pairBox('finalBox', finalMatch, 'final', points.final.x, points.final.y, finalAnim)}
      ${pairBox('bronzeBox', bronzeMatch, 'bronze', points.bronze.x, points.bronze.y, finalAnim)}

      ${node('sf2p1', sf2?.p1, sf2?.p1Wins || 0, nodeClass(sf2?.p1, sf2?.winner, live, sf2?.p1), points.sf2p1.x, points.sf2p1.y, sfAnim, true)}
      ${node('sf2p2', sf2?.p2, sf2?.p2Wins || 0, nodeClass(sf2?.p2, sf2?.winner, live, sf2?.p2), points.sf2p2.x, points.sf2p2.y, sfAnim, true)}

      ${node('qf3p1', qf3?.p1, qf3?.p1Wins || 0, nodeClass(qf3?.p1, qf3?.winner, live, qf3?.p1), points.qf3p1.x, points.qf3p1.y, qfAnim, true)}
      ${node('qf3p2', qf3?.p2, qf3?.p2Wins || 0, nodeClass(qf3?.p2, qf3?.winner, live, qf3?.p2), points.qf3p2.x, points.qf3p2.y, qfAnim, true)}
      ${node('qf4p1', qf4?.p1, qf4?.p1Wins || 0, nodeClass(qf4?.p1, qf4?.winner, live, qf4?.p1), points.qf4p1.x, points.qf4p1.y, qfAnim, true)}
      ${node('qf4p2', qf4?.p2, qf4?.p2Wins || 0, nodeClass(qf4?.p2, qf4?.winner, live, qf4?.p2), points.qf4p2.x, points.qf4p2.y, qfAnim, true)}
    </div>
  `;

  const tree = document.getElementById('bracketTree');
  const contentIds = ['qf1p1','qf1p2','qf2p1','qf2p2','sf1p1','sf1p2','finalBox','bronzeBox','sf2p1','sf2p2','qf3p1','qf3p2','qf4p1','qf4p2'];
  const contentRects = contentIds
    .map(id => document.getElementById(id))
    .filter(Boolean)
    .map(el => ({ left: el.offsetLeft, right: el.offsetLeft + el.offsetWidth }));
  if (contentRects.length) {
    const minLeft = Math.min(...contentRects.map(item => item.left));
    const maxRight = Math.max(...contentRects.map(item => item.right));
    const layoutCenter = (minLeft + maxRight) / 2;
    const containerCenter = container.clientWidth / 2;
    const visualCenterBias = -24;
    tree.style.transform = `translateX(${Math.round(containerCenter - layoutCenter + visualCenterBias)}px)`;
    tree.style.transformOrigin = 'top left';
  }
  const svgEl = document.getElementById('bracketSvg');
  svgEl.innerHTML = '';
  const bridgeLayer = document.getElementById('bridgeLayer');
  if (bridgeLayer) {
    const animateLines = shouldAnimateStage;
    const renderBridges = () => {
      bridgeLayer.innerHTML = '';
      const LINE_MS_PER_PX = 4;
      const addVerticalPair = (topId, bottomId, winner = null, delay = 0, animated = true) => {
        const a = document.getElementById(topId);
        const b = document.getElementById(bottomId);
        if (!a || !b) return 0;
        const top = a.offsetTop + a.offsetHeight;
        const height = Math.max(0, b.offsetTop - top);
        const half = Math.floor(height / 2);
        const left = a.offsetLeft + Math.floor(a.offsetWidth / 2);
        const width = 1;
        const dur1 = Math.max(140, Math.round(half * LINE_MS_PER_PX));
        const dur2 = Math.max(140, Math.round((height - half) * LINE_MS_PER_PX));
        const topClass = animated ? ' anim-v' : '';
        const bottomClass = animated ? ' anim-v from-bottom' : '';
        const topStyle = animated ? ` animation-duration:${dur1}ms; animation-delay:${delay}ms;` : '';
        const bottomStyle = animated ? ` animation-duration:${dur2}ms; animation-delay:${delay}ms;` : '';
        bridgeLayer.insertAdjacentHTML('beforeend',
          `<div class="bridge-box${topClass}${winner === 'top' ? ' win-route' : ''}" style="left:${left}px; top:${top}px; width:${width}px; height:${half}px;${topStyle}"></div>` +
          `<div class="bridge-box${bottomClass}${winner === 'bottom' ? ' win-route' : ''}" style="left:${left}px; top:${top + half}px; width:${width}px; height:${height - half}px;${bottomStyle}"></div>`
        );
        return Math.max(dur1, dur2);
      };
      const winnerHalf = (match) => {
        if (!match || !match.winner) return null;
        if (match.winner === match.p1) return 'top';
        if (match.winner === match.p2) return 'bottom';
        return null;
      };
      const baseDelay = 1000;
      const qfVerticalDur = Math.max(
        addVerticalPair('qf1p1', 'qf1p2', winnerHalf(qf1), baseDelay, animateLines),
        addVerticalPair('qf2p1', 'qf2p2', winnerHalf(qf2), baseDelay, animateLines),
        addVerticalPair('qf3p1', 'qf3p2', winnerHalf(qf3), baseDelay, animateLines),
        addVerticalPair('qf4p1', 'qf4p2', winnerHalf(qf4), baseDelay, animateLines),
      );

      const leftTopA = document.getElementById('qf1p1');
      const leftTopB = document.getElementById('qf1p2');
      const leftSf = document.getElementById('sf1p1');
      let qfHorizontalDur = 0;
      if (leftTopA && leftTopB && leftSf) {
        const baseTop = leftTopA.offsetTop + leftTopA.offsetHeight;
        const gapHeight = Math.max(0, leftTopB.offsetTop - baseTop);
        const height = 2;
        const top = baseTop + Math.floor((gapHeight - height) / 2);
        const left = leftTopA.offsetLeft + Math.floor(leftTopA.offsetWidth / 2) + 1;
        const width = Math.max(0, leftSf.offsetLeft - left);
        qfHorizontalDur = Math.max(140, Math.round(width * LINE_MS_PER_PX));
        const qf1AnimClass = animateLines ? ' anim-h' : '';
        const qf1AnimStyle = animateLines ? ` animation-duration:${qfHorizontalDur}ms; animation-delay:${baseDelay + qfVerticalDur}ms;` : '';
        bridgeLayer.insertAdjacentHTML('beforeend',
          `<div class="bridge-box${qf1AnimClass}${qf1?.winner ? ' win-route' : ''}" style="left:${left}px; top:${top}px; width:${width}px; height:${height}px;${qf1AnimStyle}"></div>`
        );
      }

      const addHorizontalBridge = (topId, bottomId, targetId, side = 'left', solid = false, winner = null, delay = 0, animated = true) => {
        const a = document.getElementById(topId);
        const b = document.getElementById(bottomId);
        const t = document.getElementById(targetId);
        if (!a || !b || !t) return 0;
        const baseTop = a.offsetTop + a.offsetHeight;
        const gapHeight = Math.max(0, b.offsetTop - baseTop);
        const height = 2;
        const top = baseTop + Math.floor((gapHeight - height) / 2);
        let left = 0;
        let width = 0;
        if (side === 'left') {
          left = a.offsetLeft + Math.floor(a.offsetWidth / 2) + 1;
          width = Math.max(0, t.offsetLeft - left);
        } else {
          left = t.offsetLeft + t.offsetWidth + 1;
          const end = a.offsetLeft + Math.floor(a.offsetWidth / 2);
          width = Math.max(0, end - left);
        }
        const dur = Math.max(140, Math.round(width * LINE_MS_PER_PX));
        const animClass = animated ? ` anim-h${side === 'right' ? ' reverse' : ''}` : '';
        const animStyle = animated ? ` animation-duration:${dur}ms; animation-delay:${delay}ms;` : '';
        bridgeLayer.insertAdjacentHTML('beforeend',
          `<div class="bridge-box${animClass}${solid ? ' solid' : ''}${winner ? ' win-route' : ''}" style="left:${left}px; top:${top}px; width:${width}px; height:${height}px;${animStyle}"></div>`
        );
        return dur;
      };

      const qfHorizontalDelay = baseDelay + qfVerticalDur;
      qfHorizontalDur = Math.max(
        qfHorizontalDur,
        addHorizontalBridge('qf2p1', 'qf2p2', 'sf1p2', 'left', false, !!qf2?.winner, qfHorizontalDelay, animateLines),
        addHorizontalBridge('qf3p1', 'qf3p2', 'sf2p1', 'right', false, !!qf3?.winner, qfHorizontalDelay, animateLines),
        addHorizontalBridge('qf4p1', 'qf4p2', 'sf2p2', 'right', false, !!qf4?.winner, qfHorizontalDelay, animateLines),
      );

      const sfVerticalDelay = qfHorizontalDelay + qfHorizontalDur;
      const sfVerticalDur = Math.max(
        addVerticalPair('sf1p1', 'sf1p2', winnerHalf(sf1), sfVerticalDelay, animateLines),
        addVerticalPair('sf2p1', 'sf2p2', winnerHalf(sf2), sfVerticalDelay, animateLines),
      );

      const finalHorizontalDelay = sfVerticalDelay + sfVerticalDur;
      addHorizontalBridge('sf1p1', 'sf1p2', 'finalBox', 'left', true, !!sf1?.winner, finalHorizontalDelay, animateLines);
      addHorizontalBridge('sf2p1', 'sf2p2', 'finalBox', 'right', true, !!sf2?.winner, finalHorizontalDelay, animateLines);
    };

    const scheduleBridgeRender = () => {
      top8BridgeTimer = setTimeout(() => {
        requestAnimationFrame(() => {
          renderBridges();
          top8LinesAnimated = true;
          top8BridgeTimer = null;
        });
      }, 1000);
    };
    if (animateLines) {
      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(scheduleBridgeRender).catch(scheduleBridgeRender);
      } else {
        requestAnimationFrame(() => requestAnimationFrame(scheduleBridgeRender));
      }
    } else {
      requestAnimationFrame(() => {
        renderBridges();
        top8LinesAnimated = true;
      });
    }
    top8BracketAnimated = true;
  }
}
</script>
</body>
</html>
