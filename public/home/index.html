<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home - Pokemon Tournament System</title>
<link rel="icon" type="image/svg+xml" href="/shared/favicon.svg">
<link rel="stylesheet" href="/shared/theme.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--pts-font-sans);
    background:
      linear-gradient(180deg, rgba(30, 41, 59, 0.42) 0, rgba(15, 23, 42, 0) 240px),
      var(--pts-page-bg);
    color: var(--pts-text);
  }
  .topbar {
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    border-bottom: 1px solid rgba(71, 85, 105, 0.7);
    background: rgba(30, 41, 59, 0.92);
  }
  .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
    color: var(--pts-text-strong);
    font-size: 15px;
    font-weight: 900;
  }
  .brand-mark {
    width: 24px;
    height: 24px;
    flex: 0 0 auto;
  }
  .brand-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .version {
    display: inline-flex;
    align-items: center;
    height: 26px;
    padding: 0 10px;
    border: 1px solid rgba(148, 163, 184, 0.22);
    border-radius: 999px;
    color: var(--pts-text-muted);
    background: rgba(15, 23, 42, 0.45);
    font-size: 12px;
    font-weight: 800;
  }
  .page-shell {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 44px 0 42px;
  }
  .layout {
    display: grid;
    grid-template-columns: minmax(280px, 330px) minmax(0, 1fr);
    gap: 20px;
    align-items: start;
  }
  .hero {
    display: flex;
    justify-content: space-between;
    gap: 24px;
    align-items: end;
    padding: 0 0 24px;
  }
  .hero-title {
    margin: 0;
    color: var(--pts-text-strong);
    font-size: clamp(32px, 4.8vw, 54px);
    line-height: 0.98;
    font-weight: 900;
    letter-spacing: 0;
  }
  .hero-subtitle {
    margin: 14px 0 0;
    color: #cbd5e1;
    font-size: 15px;
    font-weight: 700;
  }
  .panel {
    background: rgba(30, 41, 59, 0.92);
    border: 1px solid rgba(71, 85, 105, 0.7);
    border-radius: var(--pts-radius-lg);
    padding: 18px;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.22);
  }
  .create-panel {
    position: sticky;
    top: 16px;
  }
  .list-panel {
    min-height: 360px;
  }
  .panel-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 16px;
  }
  .panel-title {
    margin: 0;
    color: var(--pts-text-strong);
    font-size: 15px;
    font-weight: 900;
  }
  .panel-count {
    color: var(--pts-text-dim);
    font-size: 12px;
    font-weight: 800;
    white-space: nowrap;
  }
  .label {
    display: block;
    margin-bottom: 6px;
    color: var(--pts-text-muted);
    font-size: 12px;
    font-weight: 800;
  }
  .input {
    width: 100%;
    height: 42px;
    border: 1px solid var(--pts-border-strong);
    border-radius: var(--pts-radius-sm);
    background: rgba(15, 23, 42, 0.88);
    color: var(--pts-text-strong);
    padding: 0 11px;
    font: inherit;
    font-size: 14px;
    margin-bottom: 12px;
  }
  .input:focus {
    outline: none;
    border-color: var(--pts-warning-bright);
    box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.16);
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    border: 0;
    border-radius: var(--pts-radius-sm);
    min-height: 36px;
    padding: 8px 12px;
    color: var(--pts-text-strong);
    background: var(--pts-surface-raised);
    font: inherit;
    font-size: 13px;
    font-weight: 800;
    line-height: 1.2;
    cursor: pointer;
    transition: background var(--pts-transition-fast), color var(--pts-transition-fast), transform var(--pts-transition-fast), opacity var(--pts-transition-fast);
  }
  .btn:hover { background: var(--pts-surface-hover); }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--pts-brand); color: var(--pts-text-inverse); }
  .btn-primary:hover { background: var(--pts-brand-hover); }
  .btn-secondary { background: rgba(51, 65, 85, 0.78); color: #dbe4f0; }
  .btn-danger { background: var(--pts-danger-dark); color: #fecaca; }
  .btn-danger:hover { background: #991b1b; }
  .btn-full { width: 100%; }
  .btn-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .list {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .empty {
    display: grid;
    place-items: center;
    min-height: 246px;
    border: 1px dashed rgba(148, 163, 184, 0.34);
    border-radius: var(--pts-radius-lg);
    padding: 36px 18px;
    color: var(--pts-text-dim);
    text-align: center;
    background: rgba(15, 23, 42, 0.26);
    font-size: 14px;
    font-weight: 800;
  }
  .tour-card {
    border: 1px solid rgba(71, 85, 105, 0.78);
    border-radius: var(--pts-radius-lg);
    background: rgba(23, 32, 51, 0.94);
    padding: 15px;
    transition: border-color var(--pts-transition-fast), background var(--pts-transition-fast), transform var(--pts-transition-fast);
  }
  .tour-card:hover {
    border-color: rgba(148, 163, 184, 0.48);
    background: rgba(30, 41, 59, 0.96);
  }
  .tour-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 14px;
  }
  .tour-name {
    color: var(--pts-text-strong);
    font-size: 16px;
    font-weight: 900;
    line-height: 1.35;
    word-break: break-word;
  }
  .tour-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 7px;
    color: var(--pts-text-muted);
    font-size: 12px;
    line-height: 1.45;
  }
  .tour-id {
    max-width: 260px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #aebcd0;
    font-family: var(--pts-font-sans);
  }
  .tour-actions {
    display: grid;
    grid-template-columns: minmax(132px, auto) repeat(2, minmax(118px, auto)) 1fr auto auto;
    gap: 8px;
    align-items: center;
  }
  .tour-actions .btn {
    min-width: 0;
    white-space: nowrap;
  }
  .tour-action-spacer {
    min-width: 8px;
  }
  .phase {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 3px 10px;
    border-radius: 999px;
    background: var(--pts-phase-setup-bg);
    color: var(--pts-phase-setup-fg);
    font-size: 11px;
    font-weight: 900;
    line-height: 1.3;
    white-space: nowrap;
  }
  .phase.swiss { background: var(--pts-phase-swiss-bg); color: var(--pts-phase-swiss-fg); }
  .phase.swiss-ended { background: var(--pts-phase-swiss-ended-bg); color: var(--pts-phase-swiss-ended-fg); }
  .phase.top8 { background: var(--pts-phase-top8-bg); color: var(--pts-phase-top8-fg); }
  .phase.done { background: var(--pts-phase-done-bg); color: var(--pts-phase-done-fg); }
  .toast {
    position: fixed;
    right: 16px;
    bottom: 16px;
    display: none;
    padding: 10px 12px;
    border-radius: var(--pts-radius-md);
    background: #14532d;
    color: #dcfce7;
    font-size: 13px;
    font-weight: 800;
    box-shadow: var(--pts-shadow-md);
  }
  .toast.show { display: block; }
  .modal {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 23, 42, 0.8);
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }
  .modal.open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal-box {
    width: min(420px, 100%);
    border: 1px solid rgba(71, 85, 105, 0.78);
    border-radius: var(--pts-radius-lg);
    background: var(--pts-surface);
    padding: 16px;
    box-shadow: var(--pts-shadow-lg);
    transform: translateY(8px) scale(0.98);
    transition: transform 0.18s ease;
  }
  .modal.open .modal-box {
    transform: translateY(0) scale(1);
  }
  .modal-box h2 {
    margin: 0 0 14px;
    color: var(--pts-text-strong);
    font-size: 16px;
  }
  .modal-text {
    margin: 0 0 14px;
    color: var(--pts-text-muted);
    font-size: 13px;
    line-height: 1.7;
  }
  .modal-text strong {
    color: var(--pts-text-strong);
  }
  .qr-frame {
    width: 220px;
    height: 220px;
    display: grid;
    place-items: center;
    margin: 6px auto 14px;
    padding: 12px;
    border-radius: var(--pts-radius-lg);
    background: #fff;
    box-shadow: 0 12px 36px rgba(0, 0, 0, 0.24);
  }
  .qr-frame svg {
    width: 100%;
    height: 100%;
    display: block;
  }
  .qr-url {
    max-height: 72px;
    overflow: auto;
    margin-bottom: 14px;
    padding: 9px 10px;
    border: 1px solid rgba(71, 85, 105, 0.72);
    border-radius: var(--pts-radius-sm);
    background: rgba(15, 23, 42, 0.72);
    color: var(--pts-text-muted);
    font-family: var(--pts-font-sans);
    font-size: 11px;
    line-height: 1.45;
    word-break: break-all;
  }
  .danger-text {
    color: #fecaca;
  }
  @media (max-width: 1050px) {
    .tour-actions {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
    .tour-actions .btn-primary {
      grid-column: 1 / -1;
    }
    .tour-action-spacer { display: none; }
  }
  @media (max-width: 820px) {
    .topbar { padding: 0 16px; }
    .page-shell { padding-top: 32px; }
    .hero { display: block; padding-bottom: 20px; }
    .layout { grid-template-columns: 1fr; }
    .create-panel { position: static; }
    .tour-top { flex-direction: column; }
  }
  @media (max-width: 560px) {
    .page-shell { width: min(100% - 24px, 1180px); }
    .hero-title { font-size: 32px; }
    .tour-actions {
      grid-template-columns: 1fr 1fr;
    }
    .tour-actions .btn-primary {
      grid-column: 1 / -1;
    }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img class="brand-mark" src="/shared/favicon.svg" alt="">
      <span class="brand-text">Pokemon Tournament System</span>
    </div>
    <div class="version">2.2</div>
  </header>

  <div class="page-shell">
    <section class="hero">
      <div>
        <h1 class="hero-title">Pokemon Tournament System</h1>
        <p class="hero-subtitle">欢迎使用宝可梦赛事管理系统</p>
      </div>
    </section>

    <main class="layout">
    <section class="panel create-panel">
      <div class="panel-head">
        <h1 class="panel-title">新建比赛</h1>
      </div>
      <label class="label" for="newTournamentName">比赛名称</label>
      <input id="newTournamentName" class="input" type="text" placeholder="例如：2026 年 6 月月赛">
      <button id="createBtn" class="btn btn-primary btn-full" type="button">创建比赛</button>
    </section>

    <section class="panel list-panel">
      <div class="panel-head">
        <h2 class="panel-title">比赛列表</h2>
        <span id="tournamentCount" class="panel-count">0 场</span>
      </div>
      <div id="tournamentList" class="list"></div>
    </section>
    </main>
  </div>

  <div id="toast" class="toast">已复制</div>

  <div id="renameModal" class="modal">
    <div class="modal-box">
      <h2>重命名比赛</h2>
      <label class="label" for="renameInput">比赛名称</label>
      <input id="renameInput" class="input" type="text">
      <div class="btn-row">
        <button id="renameSaveBtn" class="btn btn-primary" type="button">保存</button>
        <button id="renameCancelBtn" class="btn" type="button">取消</button>
      </div>
    </div>
  </div>

  <div id="qrModal" class="modal">
    <div class="modal-box">
      <h2>选手入口二维码</h2>
      <p id="qrTournamentName" class="modal-text"></p>
      <div id="qrImage" class="qr-frame"></div>
      <div id="qrUrl" class="qr-url"></div>
      <div class="btn-row">
        <button id="qrCopyBtn" class="btn btn-primary" type="button">复制链接</button>
        <button id="qrCloseBtn" class="btn" type="button">关闭</button>
      </div>
    </div>
  </div>

  <div id="deleteModal" class="modal">
    <div class="modal-box">
      <h2>删除比赛</h2>
      <p class="modal-text danger-text">确认删除 <strong id="deleteTournamentName"></strong>？此操作不可恢复。</p>
      <div class="btn-row">
        <button id="deleteConfirmBtn" class="btn btn-danger" type="button">确认删除</button>
        <button id="deleteCancelBtn" class="btn" type="button">取消</button>
      </div>
    </div>
  </div>

<script src="/shared/qrcode.js"></script>
<script>
const listEl = document.getElementById('tournamentList');
const tournamentCountEl = document.getElementById('tournamentCount');
const createBtn = document.getElementById('createBtn');
const nameInput = document.getElementById('newTournamentName');
const toastEl = document.getElementById('toast');
const renameModal = document.getElementById('renameModal');
const renameInput = document.getElementById('renameInput');
const renameSaveBtn = document.getElementById('renameSaveBtn');
const renameCancelBtn = document.getElementById('renameCancelBtn');
const qrModal = document.getElementById('qrModal');
const qrTournamentName = document.getElementById('qrTournamentName');
const qrImage = document.getElementById('qrImage');
const qrUrl = document.getElementById('qrUrl');
const qrCopyBtn = document.getElementById('qrCopyBtn');
const qrCloseBtn = document.getElementById('qrCloseBtn');
const deleteModal = document.getElementById('deleteModal');
const deleteTournamentName = document.getElementById('deleteTournamentName');
const deleteConfirmBtn = document.getElementById('deleteConfirmBtn');
const deleteCancelBtn = document.getElementById('deleteCancelBtn');
let renamingTournamentId = '';
let currentQrUrl = '';
let deletingTournamentId = '';
let deletingTournamentName = '';

function escHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]));
}

const escAttr = escHtml;

function phaseLabel(phase) {
  return {
    setup: '准备中',
    swiss: '瑞士轮',
    'swiss-ended': '瑞士轮结束',
    top8: '淘汰赛',
    done: '已结束',
  }[phase] || phase || '-';
}

function phaseClass(phase) {
  return {
    swiss: 'swiss',
    'swiss-ended': 'swiss-ended',
    top8: 'top8',
    done: 'done',
  }[phase] || '';
}

function adminUrl(id) {
  return `/t/${encodeURIComponent(id)}/admin`;
}

function overlayUrl(id) {
  return `/t/${encodeURIComponent(id)}/overlay`;
}

function playerUrl(id) {
  return `/t/${encodeURIComponent(id)}/player-login`;
}

async function api(path, data = null) {
  const init = data
    ? {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      }
    : {};
  const res = await fetch(path, init);
  const json = await res.json();
  if (!res.ok || json.ok === false) throw new Error(json.err || '请求失败');
  return json;
}

function showToast(text) {
  toastEl.textContent = text;
  toastEl.classList.add('show');
  window.clearTimeout(showToast.timer);
  showToast.timer = window.setTimeout(() => toastEl.classList.remove('show'), 1400);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
  showToast('已复制链接');
}

function renderQr(text) {
  qrImage.innerHTML = '';
  const qr = qrcode(0, 'M');
  qr.addData(text);
  qr.make();
  qrImage.innerHTML = qr.createSvgTag({ cellSize: 8, margin: 0, scalable: true });
}

function openQrModal(url, tournamentName) {
  currentQrUrl = location.origin + url;
  qrTournamentName.innerHTML = `<strong>${escHtml(tournamentName || '未命名比赛')}</strong>`;
  qrUrl.textContent = currentQrUrl;
  renderQr(currentQrUrl);
  qrModal.classList.add('open');
}

function closeQrModal() {
  currentQrUrl = '';
  qrModal.classList.remove('open');
}

async function loadTournaments() {
  const tournaments = await api('/api/tournaments');
  tournamentCountEl.textContent = `${Array.isArray(tournaments) ? tournaments.length : 0} 场`;
  if (!Array.isArray(tournaments) || tournaments.length === 0) {
    listEl.innerHTML = '<div class="empty">暂无比赛</div>';
    return;
  }
  listEl.innerHTML = tournaments.map(t => {
    const admin = adminUrl(t.id);
    const player = playerUrl(t.id);
    const overlay = overlayUrl(t.id);
    const createdAt = t.date ? new Date(t.date).toLocaleString('zh-CN') : '-';
    return `
      <article class="tour-card">
        <div class="tour-top">
          <div>
            <div class="tour-name">${escHtml(t.name || '未命名比赛')}</div>
            <div class="tour-meta">
              <span class="tour-id">${escHtml(t.id)}</span>
              <span>${escHtml(createdAt)}</span>
            </div>
          </div>
          <span class="phase ${phaseClass(t.phase)}">${escHtml(phaseLabel(t.phase))}</span>
        </div>
        <div class="tour-actions">
          <button class="btn btn-primary" type="button" data-action="admin" data-url="${escAttr(admin)}">进入后台</button>
          <button class="btn btn-secondary" type="button" data-action="playerQr" data-url="${escAttr(player)}" data-name="${escAttr(t.name || '')}">选手入口二维码</button>
          <button class="btn btn-secondary" type="button" data-action="copy" data-url="${escAttr(overlay)}">复制叠加层链接</button>
          <span class="tour-action-spacer"></span>
          <button class="btn btn-secondary" type="button" data-action="rename" data-id="${escAttr(t.id)}" data-name="${escAttr(t.name || '')}">重命名</button>
          <button class="btn btn-danger" type="button" data-action="delete" data-id="${escAttr(t.id)}" data-name="${escAttr(t.name || '')}">删除</button>
        </div>
      </article>
    `;
  }).join('');
}

async function createTournament() {
  const name = nameInput.value.trim() || '未命名比赛';
  try {
    const res = await api('/api/tournaments', { action: 'create', name });
    nameInput.value = '';
    if (res.id) {
      location.href = adminUrl(res.id);
      return;
    }
    await loadTournaments();
  } catch (err) {
    alert(err.message || '创建比赛失败');
  }
}

function openRenameModal(id, currentName) {
  renamingTournamentId = id;
  renameInput.value = currentName || '';
  renameModal.classList.add('open');
  window.setTimeout(() => {
    renameInput.focus();
    renameInput.select();
  }, 30);
}

function closeRenameModal() {
  renamingTournamentId = '';
  renameModal.classList.remove('open');
}

async function submitRename() {
  if (!renamingTournamentId) return;
  try {
    await api('/api/tournaments', { action: 'rename', id: renamingTournamentId, name: renameInput.value.trim() || '未命名比赛' });
    closeRenameModal();
    await loadTournaments();
  } catch (err) {
    alert(err.message || '重命名失败');
  }
}

function openDeleteModal(id, name) {
  deletingTournamentId = id;
  deletingTournamentName = name || id;
  deleteTournamentName.textContent = `「${deletingTournamentName}」`;
  deleteModal.classList.add('open');
}

function closeDeleteModal() {
  deletingTournamentId = '';
  deletingTournamentName = '';
  deleteModal.classList.remove('open');
}

async function submitDelete() {
  if (!deletingTournamentId) return;
  try {
    await api('/api/tournaments', { action: 'delete', id: deletingTournamentId });
    closeDeleteModal();
    await loadTournaments();
  } catch (err) {
    alert(err.message || '删除失败');
  }
}

createBtn.addEventListener('click', createTournament);
nameInput.addEventListener('keydown', evt => {
  if (evt.key === 'Enter') createTournament();
});
listEl.addEventListener('click', evt => {
  const btn = evt.target.closest('button[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === 'admin') {
    location.href = btn.dataset.url;
  } else if (action === 'copy') {
    copyText(location.origin + btn.dataset.url);
  } else if (action === 'playerQr') {
    openQrModal(btn.dataset.url, btn.dataset.name);
  } else if (action === 'rename') {
    openRenameModal(btn.dataset.id, btn.dataset.name);
  } else if (action === 'delete') {
    openDeleteModal(btn.dataset.id, btn.dataset.name);
  }
});
renameSaveBtn.addEventListener('click', submitRename);
renameCancelBtn.addEventListener('click', closeRenameModal);
renameModal.addEventListener('click', evt => {
  if (evt.target === renameModal) closeRenameModal();
});
renameInput.addEventListener('keydown', evt => {
  if (evt.key === 'Enter') submitRename();
  if (evt.key === 'Escape') closeRenameModal();
});
qrCopyBtn.addEventListener('click', () => {
  if (currentQrUrl) copyText(currentQrUrl);
});
qrCloseBtn.addEventListener('click', closeQrModal);
qrModal.addEventListener('click', evt => {
  if (evt.target === qrModal) closeQrModal();
});
deleteConfirmBtn.addEventListener('click', submitDelete);
deleteCancelBtn.addEventListener('click', closeDeleteModal);
deleteModal.addEventListener('click', evt => {
  if (evt.target === deleteModal) closeDeleteModal();
});
document.addEventListener('keydown', evt => {
  if (evt.key !== 'Escape') return;
  if (qrModal.classList.contains('open')) closeQrModal();
  if (deleteModal.classList.contains('open')) closeDeleteModal();
});
loadTournaments().catch(err => {
  listEl.innerHTML = `<div class="empty">${escHtml(err.message || '加载失败')}</div>`;
});
</script>
</body>
</html>
