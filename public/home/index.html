<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokemon Tournament System</title>
<link rel="stylesheet" href="/shared/theme.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: var(--pto-font-sans);
    background: #0f172a;
    color: #e2e8f0;
  }
  .topbar {
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    border-bottom: 1px solid #334155;
    background: #1e293b;
  }
  .brand { font-size: 15px; font-weight: 800; color: #f8fafc; }
  .version { color: #94a3b8; font-size: 12px; font-weight: 700; }
  .layout {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 24px 0 40px;
    display: grid;
    grid-template-columns: 300px minmax(0, 1fr);
    gap: 18px;
  }
  .hero {
    width: min(1180px, calc(100% - 32px));
    margin: 0 auto;
    padding: 56px 0 20px;
  }
  .hero-title {
    margin: 0;
    color: #f8fafc;
    font-size: clamp(34px, 5vw, 58px);
    line-height: 1;
    font-weight: 900;
    letter-spacing: 0;
  }
  .hero-subtitle {
    margin: 12px 0 0;
    color: #cbd5e1;
    font-size: 15px;
    font-weight: 700;
  }
  .panel {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 8px;
    padding: 16px;
  }
  .panel-title {
    margin: 0 0 14px;
    color: #f8fafc;
    font-size: 15px;
    font-weight: 800;
  }
  .label {
    display: block;
    margin-bottom: 6px;
    color: #94a3b8;
    font-size: 12px;
    font-weight: 700;
  }
  .input {
    width: 100%;
    height: 40px;
    border: 1px solid #475569;
    border-radius: 6px;
    background: #0f172a;
    color: #f8fafc;
    padding: 0 11px;
    font: inherit;
    font-size: 14px;
    margin-bottom: 10px;
  }
  .input:focus {
    outline: none;
    border-color: #f59e0b;
    box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.16);
  }
  .btn {
    border: 0;
    border-radius: 6px;
    min-height: 34px;
    padding: 8px 12px;
    color: #f8fafc;
    background: #334155;
    font: inherit;
    font-size: 13px;
    font-weight: 800;
    cursor: pointer;
  }
  .btn:hover { background: #475569; }
  .btn-primary { background: #d97706; }
  .btn-primary:hover { background: #f59e0b; }
  .btn-danger { background: #7f1d1d; color: #fecaca; }
  .btn-danger:hover { background: #991b1b; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .hint {
    margin-top: 12px;
    color: #64748b;
    font-size: 12px;
    line-height: 1.6;
  }
  .list { display: flex; flex-direction: column; gap: 10px; }
  .empty {
    border: 1px dashed #475569;
    border-radius: 8px;
    padding: 36px 18px;
    color: #64748b;
    text-align: center;
  }
  .tour-card {
    border: 1px solid #334155;
    border-radius: 8px;
    background: #172033;
    padding: 14px;
  }
  .tour-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }
  .tour-name {
    color: #f8fafc;
    font-size: 15px;
    font-weight: 900;
    word-break: break-word;
  }
  .tour-meta {
    margin-top: 4px;
    color: #94a3b8;
    font-size: 12px;
    line-height: 1.6;
  }
  .phase {
    display: inline-flex;
    align-items: center;
    height: 24px;
    padding: 0 9px;
    border-radius: 999px;
    background: #475569;
    color: #e2e8f0;
    font-size: 11px;
    font-weight: 900;
    white-space: nowrap;
  }
  .phase.swiss { background: #6d28d9; }
  .phase.swiss-ended { background: #b45309; }
  .phase.top8 { background: #b91c1c; }
  .phase.done { background: #15803d; }
  .toast {
    position: fixed;
    right: 16px;
    bottom: 16px;
    display: none;
    padding: 10px 12px;
    border-radius: 8px;
    background: #14532d;
    color: #dcfce7;
    font-size: 13px;
    font-weight: 800;
    box-shadow: 0 12px 36px rgba(0,0,0,0.32);
  }
  .toast.show { display: block; }
  .modal {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 23, 42, 0.78);
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s ease;
  }
  .modal.open {
    opacity: 1;
    pointer-events: auto;
  }
  .modal-box {
    width: min(420px, 100%);
    border: 1px solid #334155;
    border-radius: 8px;
    background: #1e293b;
    padding: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.38);
    transform: translateY(8px) scale(0.98);
    transition: transform 0.18s ease;
  }
  .modal.open .modal-box {
    transform: translateY(0) scale(1);
  }
  .modal-box h2 {
    margin: 0 0 14px;
    color: #f8fafc;
    font-size: 16px;
  }
  @media (max-width: 820px) {
    .hero { padding-top: 34px; }
    .layout { grid-template-columns: 1fr; }
    .tour-top { flex-direction: column; }
  }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">Pokemon Tournament System</div>
    <div class="version">2.1</div>
  </header>

  <section class="hero">
    <h1 class="hero-title">Pokemon Tournament System</h1>
    <p class="hero-subtitle">欢迎使用宝可梦赛事管理系统</p>
  </section>

  <main class="layout">
    <section class="panel">
      <h1 class="panel-title">新建比赛</h1>
      <label class="label" for="newTournamentName">比赛名称</label>
      <input id="newTournamentName" class="input" type="text" placeholder="例如：2026 年 6 月月赛">
      <button id="createBtn" class="btn btn-primary" type="button">创建比赛</button>
    </section>

    <section class="panel">
      <h2 class="panel-title">比赛列表</h2>
      <div id="tournamentList" class="list"></div>
    </section>
  </main>

  <div id="toast" class="toast">已复制</div>

  <div id="renameModal" class="modal">
    <div class="modal-box">
      <h2>重命名比赛</h2>
      <label class="label" for="renameInput">比赛名称</label>
      <input id="renameInput" class="input" type="text">
      <div class="btn-row">
        <button id="renameSaveBtn" class="btn btn-primary" type="button">保存</button>
        <button id="renameCancelBtn" class="btn" type="button">取消</button>
      </div>
    </div>
  </div>

<script>
const listEl = document.getElementById('tournamentList');
const createBtn = document.getElementById('createBtn');
const nameInput = document.getElementById('newTournamentName');
const toastEl = document.getElementById('toast');
const renameModal = document.getElementById('renameModal');
const renameInput = document.getElementById('renameInput');
const renameSaveBtn = document.getElementById('renameSaveBtn');
const renameCancelBtn = document.getElementById('renameCancelBtn');
let renamingTournamentId = '';

function escHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    '"': '&quot;',
    "'": '&#39;',
  }[ch]));
}

const escAttr = escHtml;

function phaseLabel(phase) {
  return {
    setup: '准备中',
    swiss: '瑞士轮',
    'swiss-ended': '瑞士轮结束',
    top8: '淘汰赛',
    done: '已结束',
  }[phase] || phase || '-';
}

function phaseClass(phase) {
  return {
    swiss: 'swiss',
    'swiss-ended': 'swiss-ended',
    top8: 'top8',
    done: 'done',
  }[phase] || '';
}

function adminUrl(id) {
  return `/t/${encodeURIComponent(id)}/admin`;
}

function overlayUrl(id) {
  return `/t/${encodeURIComponent(id)}/overlay`;
}

function playerUrl(id) {
  return `/t/${encodeURIComponent(id)}/player-login`;
}

async function api(path, data = null) {
  const init = data
    ? {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      }
    : {};
  const res = await fetch(path, init);
  const json = await res.json();
  if (!res.ok || json.ok === false) throw new Error(json.err || '请求失败');
  return json;
}

function showToast(text) {
  toastEl.textContent = text;
  toastEl.classList.add('show');
  window.clearTimeout(showToast.timer);
  showToast.timer = window.setTimeout(() => toastEl.classList.remove('show'), 1400);
}

async function copyText(text) {
  try {
    await navigator.clipboard.writeText(text);
  } catch (err) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
  }
  showToast('已复制链接');
}

async function loadTournaments() {
  const tournaments = await api('/api/tournaments');
  if (!Array.isArray(tournaments) || tournaments.length === 0) {
    listEl.innerHTML = '<div class="empty">还没有比赛，先创建第一场。</div>';
    return;
  }
  listEl.innerHTML = tournaments.map(t => {
    const admin = adminUrl(t.id);
    const player = playerUrl(t.id);
    const overlay = overlayUrl(t.id);
    const createdAt = t.date ? new Date(t.date).toLocaleString('zh-CN') : '-';
    return `
      <article class="tour-card">
        <div class="tour-top">
          <div>
            <div class="tour-name">${escHtml(t.name || '未命名比赛')}</div>
            <div class="tour-meta">ID：${escHtml(t.id)}</div>
            <div class="tour-meta">创建时间：${escHtml(createdAt)}</div>
          </div>
          <span class="phase ${phaseClass(t.phase)}">${escHtml(phaseLabel(t.phase))}</span>
        </div>
        <div class="btn-row">
          <button class="btn btn-primary" type="button" data-action="admin" data-url="${escAttr(admin)}">进入后台</button>
          <button class="btn" type="button" data-action="copy" data-url="${escAttr(player)}">复制选手入口</button>
          <button class="btn" type="button" data-action="copy" data-url="${escAttr(overlay)}">复制叠加层链接</button>
          <button class="btn" type="button" data-action="rename" data-id="${escAttr(t.id)}" data-name="${escAttr(t.name || '')}">重命名</button>
          <button class="btn btn-danger" type="button" data-action="delete" data-id="${escAttr(t.id)}" data-name="${escAttr(t.name || '')}">删除</button>
        </div>
      </article>
    `;
  }).join('');
}

async function createTournament() {
  const name = nameInput.value.trim() || '未命名比赛';
  try {
    const res = await api('/api/tournaments', { action: 'create', name });
    nameInput.value = '';
    if (res.id) {
      location.href = adminUrl(res.id);
      return;
    }
    await loadTournaments();
  } catch (err) {
    alert(err.message || '创建比赛失败');
  }
}

function openRenameModal(id, currentName) {
  renamingTournamentId = id;
  renameInput.value = currentName || '';
  renameModal.classList.add('open');
  window.setTimeout(() => {
    renameInput.focus();
    renameInput.select();
  }, 30);
}

function closeRenameModal() {
  renamingTournamentId = '';
  renameModal.classList.remove('open');
}

async function submitRename() {
  if (!renamingTournamentId) return;
  try {
    await api('/api/tournaments', { action: 'rename', id: renamingTournamentId, name: renameInput.value.trim() || '未命名比赛' });
    closeRenameModal();
    await loadTournaments();
  } catch (err) {
    alert(err.message || '重命名失败');
  }
}

async function deleteTournament(id, name) {
  if (!confirm(`确认删除比赛「${name || id}」？此操作不可恢复。`)) return;
  try {
    await api('/api/tournaments', { action: 'delete', id });
    await loadTournaments();
  } catch (err) {
    alert(err.message || '删除失败');
  }
}

createBtn.addEventListener('click', createTournament);
nameInput.addEventListener('keydown', evt => {
  if (evt.key === 'Enter') createTournament();
});
listEl.addEventListener('click', evt => {
  const btn = evt.target.closest('button[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  if (action === 'admin') {
    location.href = btn.dataset.url;
  } else if (action === 'copy') {
    copyText(location.origin + btn.dataset.url);
  } else if (action === 'rename') {
    openRenameModal(btn.dataset.id, btn.dataset.name);
  } else if (action === 'delete') {
    deleteTournament(btn.dataset.id, btn.dataset.name);
  }
});
renameSaveBtn.addEventListener('click', submitRename);
renameCancelBtn.addEventListener('click', closeRenameModal);
renameModal.addEventListener('click', evt => {
  if (evt.target === renameModal) closeRenameModal();
});
renameInput.addEventListener('keydown', evt => {
  if (evt.key === 'Enter') submitRename();
  if (evt.key === 'Escape') closeRenameModal();
});
loadTournaments().catch(err => {
  listEl.innerHTML = `<div class="empty">${escHtml(err.message || '加载失败')}</div>`;
});
</script>
</body>
</html>
